<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>闭馆日·页间 — 按钮测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;font-family:'SimSun','STSong','Noto Serif SC',serif;color:#d4d4c8;user-select:none;-webkit-user-select:none}
#game{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
#scene-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#titlescr{position:absolute;inset:0;background:#080808;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
#titlescr h1{font-size:42px;color:#c8d8b8;letter-spacing:10px;margin-bottom:6px}
#titlescr .sub{font-size:14px;color:#5a6a58;letter-spacing:5px;margin-bottom:35px}
#titlescr .lore{max-width:500px;text-align:center;font-size:13px;color:#4a5a48;line-height:1.8;margin-bottom:30px;padding:0 20px}
#titlescr .sbtn{background:none;border:1px solid rgba(160,210,160,.25);color:#9aaa88;padding:10px 35px;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:3px;transition:all .3s;border-radius:2px}
#titlescr .sbtn:hover{border-color:#7aa868;color:#c8d8b8;box-shadow:0 0 18px rgba(122,168,104,.18)}
#titlescr .cred{position:absolute;bottom:55px;font-size:10px;color:#383838;letter-spacing:2px}
#debug{position:fixed;top:10px;left:10px;color:#0f0;font-size:12px;z-index:99999;background:rgba(0,0,0,.8);padding:5px 10px;max-width:90%;word-break:break-all}
</style>
</head>
<body>
<div id="game">
<div id="scene-area"></div>
<div id="titlescr">
  <h1>闭馆日·页间</h1>
  <div class="sub">第二章</div>
  <div class="lore">你在书页之间的夜晚，<br>分不清是梦还是记忆。</div>
  <button class="sbtn" id="start-btn" onclick="alert('按钮点击成功!');document.getElementById('titlescr').style.display='none';">翻开书页</button>
  <div class="cred">©珂珂制作 | 龙岗区图书馆龙岗河碧道分馆</div>
</div>
</div>
<div id="debug">等待点击...</div>
<script>
document.getElementById('start-btn').addEventListener('click',function(){
  document.getElementById('debug').textContent+='[addEventListener触发]';
});
document.getElementById('start-btn').addEventListener('mousedown',function(){
  document.getElementById('debug').textContent+='[mousedown]';
});
document.getElementById('start-btn').addEventListener('touchstart',function(){
  document.getElementById('debug').textContent+='[touchstart]';
});
// 检测是否有其他元素覆盖按钮
document.addEventListener('click',function(e){
  document.getElementById('debug').textContent+='[全局click:'+e.target.tagName+'#'+e.target.id+'.'+e.target.className+']';
},true);
</script>
</body>
</html>
