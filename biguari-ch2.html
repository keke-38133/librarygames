<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>闭馆日·页间 — 第二章</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;font-family:'SimSun','STSong','Noto Serif SC',serif;color:#d4d4c8;user-select:none;-webkit-user-select:none}
#game{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
#scene-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scene{position:absolute;display:none;cursor:crosshair}
.scene.active{display:block}
.scene img{display:block;pointer-events:none}
.hotspot{position:absolute;border:2px solid transparent;cursor:default;z-index:10;transition:border-color .3s,box-shadow .3s,background .3s}
.hotspot.flash{border-color:rgba(160,220,160,.4);box-shadow:0 0 18px rgba(160,220,160,.15);background:rgba(160,220,160,.05)}
.hotspot.glow{animation:gp 2.5s ease-in-out infinite}
.hotslot-filled{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(120,180,100,.15);border:2px solid rgba(120,180,100,.5)!important;border-radius:6px;box-shadow:0 0 20px rgba(120,180,100,.25)}
.hotslot-filled .fill-icon{font-size:28px;margin-bottom:2px}
.hotslot-filled .fill-name{font-size:10px;color:#b8d898;text-shadow:0 0 6px rgba(120,180,100,.6);white-space:nowrap}
@keyframes gp{0%,100%{box-shadow:0 0 5px rgba(160,220,160,.06)}50%{box-shadow:0 0 20px rgba(160,220,160,.22)}}
@media(max-width:600px){
  #textbox{font-size:13px;bottom:72px;padding:10px 14px}
  .inv-slot{width:48px;height:46px;font-size:8px}
  .inv-slot .ic{font-size:15px}
  #nav{top:4px;right:4px}
  .nb{font-size:10px;padding:3px 8px}
  .sbtn{font-size:16px;padding:10px 30px}
  #titlescr .lore{font-size:11px}
  #titlescr h1{font-size:28px}
  .hotslot-filled .fill-icon{font-size:22px}
  .hotslot-filled .fill-name{font-size:8px}
  .drag-item{font-size:14px!important}
  .grid-cell{width:44px!important;height:44px!important;font-size:16px!important}
}
#textbox{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);max-width:680px;width:88%;background:rgba(5,5,5,.9);border:1px solid rgba(160,210,160,.12);border-radius:3px;padding:14px 18px 14px 14px;z-index:50;display:none;font-size:14px;line-height:1.8}
#textbox.show{display:block;animation:tfi .4s ease}
@keyframes tfi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#textbox .n{color:#7aa868;font-size:11px;font-style:italic;margin-bottom:3px;letter-spacing:1px}
#textbox .c{color:#c8d4b8}
#textbox .cl{color:#a8c888;border-left:2px solid #5a8;padding-left:8px;margin-top:5px;font-size:12px}
#txtclose{position:absolute;top:5px;right:8px;color:#555;cursor:pointer;font-size:16px;line-height:1}
#txtclose:hover{color:#aaa}
#inv{position:fixed;bottom:0;left:0;width:100%;height:64px;background:rgba(8,8,8,.94);border-top:1px solid rgba(160,210,160,.1);display:flex;align-items:center;padding:0 8px;z-index:100;overflow-x:auto;gap:5px;-webkit-overflow-scrolling:touch}
#inv::before{content:"物品栏";position:absolute;top:-17px;left:10px;font-size:10px;color:rgba(160,210,160,.3);letter-spacing:2px}
.inv-slot{width:54px;height:52px;border:1px solid rgba(160,210,160,.15);border-radius:3px;background:rgba(25,25,25,.7);display:flex;align-items:center;justify-content:center;font-size:9px;text-align:center;color:#9aaa88;cursor:pointer;flex-shrink:0;transition:all .2s;padding:2px;line-height:1.15;flex-direction:column}
.inv-slot:hover{border-color:rgba(160,210,160,.4);background:rgba(35,45,35,.7)}
.inv-slot.sel{border-color:#7aa868;box-shadow:0 0 10px rgba(122,168,104,.35);background:rgba(40,60,40,.7)}
.inv-slot .ic{font-size:18px;display:block;margin-bottom:1px}
#nav{position:fixed;top:8px;right:8px;z-index:100;display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.nb{background:rgba(8,8,8,.85);border:1px solid rgba(160,210,160,.12);color:#7a8a78;padding:3px 9px;font-size:11px;cursor:pointer;border-radius:2px;font-family:inherit;transition:all .2s;white-space:nowrap}
.nb:hover{border-color:rgba(160,210,160,.35);color:#a8c888}
.nb-hint{background:rgba(8,8,8,.85);border:1px solid rgba(200,180,100,.25);color:#c8a868;padding:3px 9px;font-size:11px;cursor:pointer;border-radius:2px;font-family:inherit;transition:all .2s;white-space:nowrap}
.nb-hint:hover{border-color:rgba(200,180,100,.5);color:#e8c888}
#titlescr{position:absolute;inset:0;background:#080808;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
#titlescr h1{font-size:42px;color:#c8d8b8;letter-spacing:10px;margin-bottom:6px;text-shadow:0 0 25px rgba(122,168,104,.25);animation:titleGlow 4s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 25px rgba(122,168,104,.2)}50%{text-shadow:0 0 40px rgba(122,168,104,.4)}}
#titlescr .sub{font-size:14px;color:#5a6a58;letter-spacing:5px;margin-bottom:35px}
#titlescr .sbtn{background:none;border:1px solid rgba(160,210,160,.25);color:#9aaa88;padding:10px 35px;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:3px;transition:all .3s;border-radius:2px}
#titlescr .sbtn:hover{border-color:#7aa868;color:#c8d8b8;box-shadow:0 0 18px rgba(122,168,104,.18)}
#titlescr .cred{position:absolute;bottom:55px;font-size:10px;color:#383838;letter-spacing:2px}
#titlescr .lore{max-width:500px;text-align:center;font-size:13px;color:#4a5a48;line-height:1.8;margin-bottom:30px;padding:0 20px}
#fade{position:absolute;inset:0;background:#000;z-index:150;pointer-events:none;opacity:0;transition:opacity .7s}
#fade.on{opacity:1}
#modal{position:absolute;inset:0;background:rgba(0,0,0,.82);z-index:180;display:none;align-items:center;justify-content:center}
#modal.show{display:flex}
#mbox{background:rgba(18,22,18,.96);border:1px solid rgba(160,210,160,.18);border-radius:5px;padding:28px;max-width:420px;width:90%;text-align:center}
#mbox h3{color:#a8c888;margin-bottom:14px;font-size:17px;letter-spacing:2px}
#mbox p{color:#989888;font-size:13px;line-height:1.8;margin-bottom:18px}
#mbox .mbtn{display:flex;gap:8px;justify-content:center}
#mbox button{background:none;border:1px solid rgba(160,210,160,.2);color:#989888;padding:7px 22px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s;border-radius:2px}
#mbox button:hover{border-color:#7aa868;color:#c8d8b8}
#inputol{position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:180;display:none;align-items:center;justify-content:center}
#inputol.show{display:flex}
#ibox{background:rgba(18,22,18,.96);border:1px solid rgba(160,210,160,.18);border-radius:5px;padding:28px;max-width:380px;width:90%;text-align:center}
#ibox h3{color:#a8c888;margin-bottom:10px;font-size:15px}
#ibox input{background:rgba(8,8,8,.8);border:1px solid rgba(160,210,160,.18);color:#d4d4c8;padding:9px 14px;font-size:20px;text-align:center;letter-spacing:7px;width:200px;font-family:monospace;border-radius:2px;outline:none}
#ibox input:focus{border-color:#7aa868}
#ibox .ibtn{margin-top:14px;display:flex;gap:8px;justify-content:center}
#ibox button{background:none;border:1px solid rgba(160,210,160,.2);color:#989888;padding:5px 18px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s;border-radius:2px}
#ibox button:hover{border-color:#7aa868;color:#c8d8b8}
#ibox .hint{color:#555;font-size:11px;margin-top:9px}
#endscr{position:absolute;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#endscr.show{display:flex}
#endscr h2{font-size:26px;color:#a8c888;letter-spacing:5px;margin-bottom:18px;animation:efi 2s ease}
#endscr .et{max-width:560px;font-size:14px;line-height:2;color:#7a8a78;margin-bottom:28px;animation:efi 3s ease}
@keyframes efi{from{opacity:0}to{opacity:1}}
#endscr .rbtn{background:none;border:1px solid rgba(160,210,160,.25);color:#989888;padding:8px 28px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:2px;transition:all .3s;border-radius:2px}
#endscr .rbtn:hover{border-color:#7aa868;color:#c8d8b8}
#cbar{position:fixed;bottom:64px;left:0;width:100%;text-align:center;font-size:9px;color:rgba(110,110,110,.35);z-index:90;letter-spacing:1px;pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shaking{animation:shake 0.15s linear 2}
@keyframes invFlash{0%{border-color:rgba(160,210,160,.8);box-shadow:0 0 15px rgba(160,210,160,.5)}100%{border-color:rgba(160,210,160,.1);box-shadow:none}}
#inv.flash-highlight{animation:invFlash .5s ease-out}
#scene-overlay{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .5s}
#scene-overlay.on{opacity:1}
#end-overlay{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity 1.5s}
#end-card{background:#0a0a0a;border:1px solid rgba(160,210,160,.18);border-radius:6px;padding:28px 24px;max-width:360px;width:90%;text-align:center;margin-top:20px}
#end-card .ec-title{font-size:20px;color:#a8c888;letter-spacing:4px;margin-bottom:8px}
#end-card .ec-ending{font-size:14px;color:#c8d8b8;margin-bottom:6px;letter-spacing:2px}
#end-card .ec-time{font-size:13px;color:#7a8a78;margin-bottom:10px}
#end-card .ec-quote{font-size:12px;color:#9a9a88;font-style:italic;margin-bottom:14px;line-height:1.6}
#end-card .ec-url{font-size:9px;color:rgba(160,210,160,.3);letter-spacing:1px;margin-bottom:14px}
#end-card .ec-btns{display:flex;gap:8px;justify-content:center}
#end-card .ec-btns button{background:none;border:1px solid rgba(160,210,160,.2);color:#989888;padding:6px 18px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s;border-radius:2px}
#end-card .ec-btns button:hover{border-color:#7aa868;color:#c8d8b8}
.bookshelf-puzzle{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.bookshelf-puzzle .shelf-btn{background:rgba(30,40,30,.8);border:1px solid rgba(160,210,160,.2);color:#a8c888;min-width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border-radius:3px;font-family:inherit;transition:all .2s;padding:4px 8px}
.bookshelf-puzzle .shelf-btn:hover{border-color:#7aa868}
.bookshelf-puzzle .shelf-btn.placed{background:rgba(50,70,50,.6);border-color:#7aa868;color:#d8e8c8}
/* === HER TREES 交互样式 === */
.drag-item{position:absolute;cursor:grab;z-index:20;padding:4px 10px;font-size:18px;color:#d4d4c8;background:rgba(25,25,25,.85);border:1px solid rgba(160,210,160,.2);border-radius:3px;font-family:'SimSun','STSong',serif;transition:transform .1s,box-shadow .1s;touch-action:none;user-select:none;-webkit-user-select:none}
.drag-item:hover{border-color:rgba(160,210,160,.5);box-shadow:0 0 8px rgba(160,210,160,.2)}
.drag-item.dragging{cursor:grabbing;transform:scale(1.08) rotate(1deg);box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:100;opacity:.9}
.drag-item.placed{cursor:default;opacity:.7;border-color:rgba(120,180,100,.5);background:rgba(40,60,40,.7)}
.overlay-page{position:absolute;z-index:15;background:rgba(200,190,160,.12);border:1px solid rgba(200,180,120,.15);border-radius:2px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;transition:opacity .3s;backdrop-filter:blur(0.5px)}
.overlay-page:hover{border-color:rgba(200,180,120,.3)}
.overlay-page.dragging{cursor:grabbing;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.stack-result{position:absolute;z-index:30;background:rgba(200,190,160,.2);border:1px solid rgba(200,180,120,.25);border-radius:3px;padding:6px 12px;color:#c8a848;font-size:16px;text-align:center;animation:stackReveal 1.5s ease forwards;pointer-events:none}
@keyframes stackReveal{0%{opacity:0;transform:scale(.8)}30%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.grid-cell{width:54px;height:54px;border:1px solid rgba(160,210,160,.15);border-radius:3px;background:rgba(15,18,15,.8);display:flex;align-items:center;justify-content:center;font-size:20px;color:#7a8a78;cursor:pointer;transition:all .2s;font-family:'SimSun','STSong',serif}
.grid-cell.filled{border-color:rgba(160,210,160,.4);color:#a8c888;background:rgba(30,45,30,.6)}
.grid-cell.correct{border-color:#7aa868;background:rgba(50,70,50,.5);color:#c8d8b8;box-shadow:0 0 8px rgba(122,168,104,.2)}
.char-split{display:inline-block;transition:all .4s ease;position:relative}
.char-split.splitting .left-part{transform:translateX(-12px);opacity:.6}
.char-split.splitting .right-part{transform:translateX(12px);opacity:.6}
.lamp-chain{position:absolute;z-index:15;cursor:grab;touch-action:none;width:8px;background:repeating-linear-gradient(180deg,#555 0px,#555 3px,#444 3px,#444 6px);border-radius:2px}
.lamp-glow{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(200,168,72,.25) 0%,rgba(200,168,72,.08) 40%,transparent 70%);pointer-events:none;z-index:12;transition:all .5s ease}
.pressmark-glow{position:absolute;z-index:18;pointer-events:none;opacity:0;transition:opacity 1.5s ease;color:rgba(180,180,220,.4);font-size:14px;font-family:'SimSun','STSong',serif;text-shadow:0 0 10px rgba(180,180,220,.3)}
.pressmark-glow.visible{opacity:1}
.merge-btn{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);background:rgba(122,168,104,.3);border:1px solid #7aa868;color:#c8d8b8;padding:8px 24px;font-size:14px;cursor:pointer;border-radius:3px;font-family:inherit;letter-spacing:2px;z-index:55;display:none;animation:tfi .3s ease}
.merge-btn:hover{background:rgba(122,168,104,.5)}
.merge-btn.show{display:block}
@keyframes charTear{0%{transform:scale(1)}30%{transform:scale(1.1)}60%{transform:scale(.95) rotate(-1deg)}100%{transform:scale(1) rotate(0)}}
.tear-anim{animation:charTear .5s ease}
@keyframes paperSettle{0%{transform:translateY(-4px);opacity:.5}100%{transform:translateY(0);opacity:1}}
.paper-settle{animation:paperSettle .3s ease}
@keyframes moonMove{0%{transform:translateX(-5%)}50%{transform:translateX(5%)}100%{transform:translateX(-5%)}}
.moonlight-spot{position:absolute;z-index:12;pointer-events:none;border-radius:50%;background:radial-gradient(circle,rgba(180,180,220,.08) 0%,rgba(180,180,220,.03) 40%,transparent 70%);animation:moonMove 20s ease-in-out infinite}
@keyframes pressGlow{0%,100%{opacity:.3}50%{opacity:.7}}
.press-active{animation:pressGlow 2s ease-in-out infinite}
</style>
</head>

// ===== 拖拽引擎 =====
var dragState={el:null,ox:0,oy:0,startX:0,startY:0};
function makeDraggable(el,onDrop){
  function onStart(cx,cy){
    dragState.el=el;
    var r=el.getBoundingClientRect();
    dragState.ox=cx-r.left;dragState.oy=cy-r.top;
    dragState.startX=parseInt(el.style.left)||0;
    dragState.startY=parseInt(el.style.top)||0;
    el.classList.add('dragging');
  }
  function onMove(cx,cy){
    if(!dragState.el||dragState.el!==el)return;
    var parent=el.parentElement;
    var pr=parent.getBoundingClientRect();
    var nx=cx-pr.left-dragState.ox;
    var ny=cy-pr.top-dragState.oy;
    el.style.left=nx+'px';el.style.top=ny+'px';
  }
  function onEnd(cx,cy){
    if(dragState.el!==el)return;
    el.classList.remove('dragging');
    if(onDrop)onDrop(el);
    dragState.el=null;
  }
  el.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();onStart(e.clientX,e.clientY);});
  el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:false});
  document.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
  document.addEventListener('touchmove',function(e){if(dragState.el===el){var t=e.touches[0];onMove(t.clientX,t.clientY);}},{passive:false});
  document.addEventListener('mouseup',function(e){onEnd(e.clientX,e.clientY);});
  document.addEventListener('touchend',function(e){if(dragState.el===el)onEnd(0,0);});
}

function renderInv(){
  var inv=$('inv');inv.innerHTML='';
  S.inv.forEach(function(id){
    var it=ITEMS[id];
    var d=document.createElement('div');
    d.className='inv-slot'+(S.sel===id?' sel':'');
    d.innerHTML='<span class="ic">'+it.ic+'</span>'+it.n;
    d.onclick=function(){
      if(S.sel===id){
        S.sel=null;
      }else{
        S.sel=id;
        showText(it.n,it.ic+' <b>'+it.n+'</b><br><span style="color:#aaa">'+it.d+'</span>',3000);
        // 叠合模式：选中两个碎片后显示叠合按钮
        if(id==='pageA'||id==='pageB'||id==='pageC'){
          if(S.f.mergeItems.indexOf(id)<0){
            S.f.mergeItems.push(id);
          }
          if(S.f.mergeItems.length>=2){
            showMergeBtn();
          }
        }
      }
      renderInv();
    };
    inv.appendChild(d);
  });
}

function sizeScene(el){
  var area=$('scene-area');
  var aw=area.clientWidth,ah=area.clientHeight;
  var ratio=el.getAttribute('data-ratio');
  var rw,rh;
  if(ratio==='1/1'){rw=1;rh=1;}else{rw=4;rh=3;}
  var scale=Math.min(aw/rw,ah/rh);
  var w=Math.floor(rw*scale),h=Math.floor(rh*scale);
  el.style.width=w+'px';el.style.height=h+'px';
  var img=el.querySelector('img');
  if(img){img.style.width=w+'px';img.style.height=h+'px';}
}
function sizeAll(){document.querySelectorAll('.scene').forEach(function(el){sizeScene(el);});}

function handleClick(id){
  if(S.f.over)return;
  S.lastAction=Date.now();
  renderNav();
  closeText();
  switch(S.scene){
    case 'corridor':hCorridor(id);break;
    case 'hall':hHall(id);break;

    case 'maze':hMaze(id);break;

}

function showShelfPuzzle(){
  showModal('书脊归位','地面上散落着四本书，书脊上各有一个字。墙上有四个凹槽。<br><br>将书拖回正确位置，让书脊上的字连成一句话。<br><br><div class="bookshelf-puzzle" id="shelf-puzzle"></div>',[['关闭',function(){}]]);
  setTimeout(function(){
    var container=document.getElementById('shelf-puzzle');
    if(!container)return;
    container.innerHTML='';
    var chars=['回','欢','来','迎'];
    var correct=['欢','迎','回','来'];
    var slots=[];
    // 凹槽
    for(var i=0;i<4;i++){
      var slot=document.createElement('div');
      slot.className='shelf-btn';
      slot.setAttribute('data-slot',i);
      slot.textContent='—';
      slot.style.minWidth='50px';
      container.appendChild(slot);
      slots.push(slot);
    }
    // 书
    var bookArea=document.createElement('div');
    bookArea.style.cssText='display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap';
    var placed=0;
    chars.forEach(function(ch){
      var btn=document.createElement('div');
      btn.className='shelf-btn';
      btn.textContent=ch;
      btn.style.cursor='pointer';
      btn.onclick=function(){
        if(placed>=4)return;
        if(slots[placed]){
          slots[placed].textContent=ch;
          slots[placed].classList.add('placed');
          placed++;
          if(placed===4){
            // 检查是否正确
            var result=slots.map(function(s){return s.textContent;}).join('');
            if(result==='欢迎回来'){
              S.f.shelfPuzzleSolved=true;
              addInv('note1');
              setTimeout(function(){
                $('modal').className='';
                showText('书脊归位','<span style="color:#c8a848;font-size:20px;letter-spacing:5px">欢迎回来</span><br><br>四个字亮了一瞬，然后暗下去。<br><br>走廊深处传来纸页翻动的声音，像有人在等你。<br><br>你获得了沈先生手记·第1页。',5000);
              },500);
            }else{
              setTimeout(function(){
                slots.forEach(function(s){s.textContent='—';s.classList.remove('placed');});
                placed=0;
                showText('','顺序不对。书脊上的字没有连成通顺的句子。再试试。',2500);
              },600);
            }
          }
        }
      };
      bookArea.appendChild(btn);
    });
    container.appendChild(bookArea);
    // 提示
    var hint=document.createElement('div');
    hint.style.cssText='color:#555;font-size:11px;margin-top:8px';
    hint.textContent='点击书籍，按顺序放入凹槽';
    container.appendChild(hint);
  },100);
}

function showNineGridPuzzle(){
  showModal('九宫格','桌上有9张散页，每张上面有一个字符。排列它们形成索书号序列。<br><br><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:200px;margin:12px auto" id="nine-grid"></div>',[['关闭',function(){}]]);
  setTimeout(function(){
    var grid=document.getElementById('nine-grid');
    if(!grid)return;
    grid.innerHTML='';
    // 九宫格字符：I,2,4,K,.,7,空,空,空 (简化版：6个有效+3个干扰)
    var chars=['I','2','4','K','.','7','Λ','Ω','Δ'];
    var correct='I24K.7';
    var cells=[];
    var selected=[];
    for(var i=0;i<9;i++){
      var cell=document.createElement('div');
      cell.className='grid-cell';
      cell.textContent=chars[i];
      cell.setAttribute('data-idx',i);
      cell.onclick=function(){
        var idx=parseInt(this.getAttribute('data-idx'));
        if(selected.indexOf(idx)>=0){
          selected.splice(selected.indexOf(idx),1);
          this.classList.remove('filled');
        }else if(selected.length<6){
          selected.push(idx);
          this.classList.add('filled');
        }
        if(selected.length===6){
          var result=selected.map(function(s){return chars[s];}).join('');
          if(result===correct){
            S.f.nineGridSolved=true;
            selected.forEach(function(s){cells[s].classList.add('correct');});
            setTimeout(function(){
              $('modal').className='';

// ===== GAME START =====
function startGame(){
  var saved=loadGame();
  if(saved&&saved.scene){
    showModal('继续阅读','检测到上次的书签。要从上次的位置继续吗？',[['继续阅读',function(){$('titlescr').style.display='none';$('modal').className='';resumeGame(saved);}],['从头开始',function(){$('titlescr').style.display='none';$('modal').className='';clearSave();newGame();}]]);
  }else{
    $('titlescr').style.display='none';
    newGame();
  }
}

function resumeGame(saved){
  S=saved;
  if(!S.f)S.f=JSON.parse(JSON.stringify(DEFAULT_S.f));
  // 补全新增的flag
  Object.keys(DEFAULT_S.f).forEach(function(k){if(!(k in S.f))S.f[k]=DEFAULT_S.f[k];});
  S.lastAction=Date.now();
  renderInv();
  renderNav();
  bgm.volume=0.35;
  if(bgm.paused){bgm.play().catch(function(){});}
  var sc=$('sc-'+S.scene);
  if(sc){sc.className='scene active';sizeScene(sc);}
  updateBGM(S.scene);
}

  S.lastAction=Date.now();

    var v=bgm.volume+0.005;if(v>0.35)v=0.35;bgm.volume=v;

  setTimeout(function(){
    $('fade').className='';
    var sc=$('sc-corridor');sc.className='scene active';sizeScene(sc);
  },700);
  // 开场叙事 - 根据第一章结局
  setTimeout(function(){
    if(ch1Ending==='escape'||ch1Ending==='逃离'){
      showText('','你以为自己离开了。',3000);
      setTimeout(function(){
        showText('','回到日常后，书页开始出现在不该出现的地方——枕边、口袋、地铁座椅缝隙。每一页上都只有半行字，像被撕开的书信。',5000);
        setTimeout(function(){
          showText('','你翻开最后一页，发现自己站在碧道分馆门口。门开着。',4000);
        },5500);
      },3500);
    }else if(ch1Ending==='succeed'||ch1Ending==='继任'||ch1Ending==='新任馆长'){
      showText('','你坐下了。书页环绕你翻飞。',3000);
      setTimeout(function(){
        showText('','但当它们落下时，你发现自己不在特藏室——你在一间从未见过的房间。墙上的书架是空的，地面铺满了散落的书页。沈先生的椅子在角落，但椅子上没有人。',5000);
        setTimeout(function(){
          showText('','你回到了图书馆，但图书馆变了。',4000);
        },5500);
      },3500);
    }else{
      showText('','你回到了图书馆。',3000);
      setTimeout(function(){
        showText('','但图书馆变了。书架的位置偏移了，走廊比记忆中更长。地面散落着书页，像深秋的落叶。',5000);
      },3500);
    }
    setTimeout(function(){
      showText('','这不是惩罚，不是考验。是你和这里之间的那根线，把你拉回来了。',4500);
      setTimeout(function(){
        showText('','<span style="color:#a8c888">拾起地上的书页。跟着痕迹走。</span>',3500);
      },5000);
    },9000);
  },1200);
}

window.addEventListener('load',function(){
  sizeAll();
  // 绑定开始按钮（兼容CSP限制的环境）
  var sb=document.getElementById('start-btn');
  if(sb)sb.addEventListener('click',startGame);
  // 调试用：如果有JS错误会在屏幕上显示
  window.onerror=function(msg,url,line){
    var d=document.createElement('div');
    d.style.cssText='position:fixed;top:0;left:0;background:red;color:#fff;padding:8px;z-index:99999;font-size:12px;max-width:100%';
    d.textContent='Error:'+msg+' (line:'+line+')';
    document.body.appendChild(d);
    return true;
  };
});
window.addEventListener('resize',function(){sizeAll();});
</script>
