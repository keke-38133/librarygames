<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>恐怖图书馆：午夜守馆人</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
  background:#08080c;
  color:#eeeeee;
  font-family:serif;
  overflow:hidden;
  user-select:none;
}
#gameBox {
  width:100vw;
  height:100vh;
  position:relative;
  background:linear-gradient(#101018,#050508);
}
.topBar {
  position:absolute;
  top:0;
  width:100%;
  padding:12px;
  display:flex;
  justify-content:space-between;
  z-index:10;
  background:rgba(0,0,0,0.6);
}
.san {
  color:#ff6666;
  font-size:16px;
}
.time {
  color:#aaaaaa;
  font-size:16px;
}
.bookShelf {
  position:absolute;
  background:#221e1b;
  border:2px solid #443c36;
}
.eventItem {
  position:absolute;
  font-size:32px;
  text-align:center;
  animation:shake 0.3s infinite alternate;
}
.ctrlBtn {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 30px;
  background:#2b2b38;
  border:1px solid #777;
  color:#fff;
  border-radius:30px;
  font-size:16px;
  display:none;
}
.flashDark {
  animation:flashDark 0.2s;
}
@keyframes shake {
  from {transform:rotate(-2deg);}
  to {transform:rotate(2deg);}
}
@keyframes flashDark {
  0%{background:#000;}
  100%{background:transparent;}
}
.tip {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#ff4444;
  font-size:20px;
  display:none;
  text-shadow:0 0 10px #000;
}
</style>
</head>
<body>
<div id="gameBox">
  <div class="topBar">
    <div class="san">理智值：<span id="san">100</span></div>
    <div class="time">存活时间：<span id="surviveTime">0</span>/180</div>
  </div>
  <div class="tip" id="tip"></div>
  <button class="ctrlBtn" id="btnDeal" onclick="dealEvent()">立即处理诡异事件</button>
</div>

<script>
let san = 100;
let surviveTime = 0;
let gameRun = true;
let nowEvent = null;
let eventCount = 0;
const gameBox = document.getElementById('gameBox');
const sanDom = document.getElementById('san');
const timeDom = document.getElementById('surviveTime');
const btnDeal = document.getElementById('btnDeal');
const tipDom = document.getElementById('tip');

function initShelf(){
  for(let i=0;i<4;i++){
    let shelf = document.createElement('div');
    shelf.className = 'bookShelf';
    shelf.style.width = '80px';
    shelf.style.height = '180px';
    shelf.style.left = (15 + i*220) + 'px';
    shelf.style.top = '120px';
    gameBox.appendChild(shelf);
  }
}

const eventList = [
  {text:'📚',name:'书架倒塌',desc:'读者推倒了老旧书架！'},
  {text:'💧',name:'黑液泼洒',desc:'诡异黑色液体铺满地面！'},
  {text:'👻',name:'读者嘶吼',desc:'陌生读者疯狂吵闹喧哗！'},
  {text:'📖',name:'乱书纷飞',desc:'书本凭空飞出散落一地！'},
  {text:'👁️',name:'凝视读者',desc:'诡异人影死死盯着馆长！'}
];

function createEvent(){
  if(!gameRun||nowEvent)return;
  let ran = Math.floor(Math.random()*eventList.length);
  let e = eventList[ran];
  let x = Math.random()*(window.innerWidth-100);
  let y = 180 + Math.random()*300;
  let dom = document.createElement('div');
  dom.className = 'eventItem';
  dom.innerText = e.text;
  dom.style.left = x+'px';
  dom.style.top = y+'px';
  gameBox.appendChild(dom);
  nowEvent = {dom,info:e};
  eventCount++;
  san -= 2;
  updateUI();
  btnDeal.style.display = 'block';
}

function dealEvent(){
  if(!nowEvent)return;
  nowEvent.dom.remove();
  nowEvent = null;
  btnDeal.style.display = 'none';
  if(Math.random()>0.6){
    gameBox.classList.add('flashDark');
    setTimeout(()=>gameBox.classList.remove('flashDark'),200);
  }
}

function timeTick(){
  if(!gameRun)return;
  surviveTime++;
  timeDom.innerText = surviveTime;
  if(surviveTime >= 180){
    gameOver(true);
  }
  if(eventCount >= 6){
    san = 0;
  }
  if(san <= 0){
    san = 0;
    gameOver(false);
  }
  updateUI();
}

function updateUI(){
  sanDom.innerText = san;
}

function gameOver(isWin){
  gameRun = false;
  btnDeal.style.display = 'none';
  if(isWin){
    tipDom.innerText = '你撑过了午夜，图书馆暂时沉寂，成功通关！';
  }else{
    tipDom.innerText = '理智彻底崩坏，你沦为图书馆里新的诡异访客...';
  }
  tipDom.style.display = 'block';
}

initShelf();
setInterval(createEvent,1200);
setInterval(timeTick,1000);
</script>
</body>
</html>
