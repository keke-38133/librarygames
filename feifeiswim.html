<script>
// Domain verification
(function(){var h=location.hostname;if(h!=='game.kekelab.top'&&h!=='localhost'&&h!=='127.0.0.1'&&h!==''){/* dev ok */}})();
document.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&'IJC'.includes(e.key))||(e.ctrlKey&&e.key==='u'))e.preventDefault()});

// ========== CANVAS SETUP ==========
const C=document.getElementById('gc'),X=C.getContext('2d');
let W,H,dpr;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;C.width=W*dpr;C.height=H*dpr;C.style.width=W+'px';C.style.height=H+'px';X.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener('resize',resize);

// ========== UTILITY ==========
const lerp=(a,b,t)=>a+(b-a)*t,clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rand=(a,b)=>a+Math.random()*(b-a),randInt=(a,b)=>Math.floor(rand(a,b+1));
const easeOut=t=>1-Math.pow(1-t,3),easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

// ========== PARTICLE SYSTEM ==========
let particles=[];
class Particle{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;this.life=1;this.dead=false;this.age=0;
    if(type==='bubble'){this.vx=rand(-.3,.3);this.vy=rand(-1.8,-.6);this.size=rand(3,9);this.maxLife=rand(50,110);this.wobble=rand(0,6.28);}
    else if(type==='splash'){let a=rand(-Math.PI,-.1),s=rand(2,6);this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;this.size=rand(2,6);this.maxLife=rand(18,38);this.gravity=.18;}
    else if(type==='star'){let a=rand(0,6.28),s=rand(1,4);this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;this.size=rand(5,10);this.maxLife=rand(25,55);this.gravity=.06;this.rot=rand(0,6.28);}
    else if(type==='confetti'){let a=rand(0,6.28),s=rand(2,7);this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-3;this.size=rand(4,8);this.maxLife=rand(50,110);this.gravity=.12;this.color=['#FF6B6B','#4ECDC4','#FFE66D','#95E1D3','#F38181','#AA96DA'][randInt(0,5)];this.rot=rand(0,6.28);}
  }
  update(){this.age++;this.life=1-this.age/this.maxLife;if(this.life<=0){this.dead=true;return;}this.x+=this.vx;this.y+=this.vy;if(this.type==='bubble'){this.wobble+=.06;this.x+=Math.sin(this.wobble)*.4;this.size+=.015;}else if(this.type==='splash'||this.type==='confetti'){this.vy+=this.gravity;}else if(this.type==='star'){this.vy+=this.gravity;this.rot+=.12;}}
  draw(ctx){if(this.dead)return;ctx.save();ctx.globalAlpha=Math.max(0,this.life);
    if(this.type==='bubble'){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,6.28);ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=.5;ctx.stroke();ctx.beginPath();ctx.arc(this.x-this.size*.3,this.y-this.size*.3,this.size*.15,0,6.28);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();}
    else if(this.type==='splash'){ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,6.28);ctx.fillStyle='rgba(179,229,252,0.7)';ctx.fill();}
    else if(this.type==='star'){ctx.translate(this.x,this.y);ctx.rotate(this.rot);drawStar(ctx,0,0,this.size,this.size*.4,5);ctx.fillStyle='#FFD54F';ctx.fill();}
    else if(this.type==='confetti'){ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.fillStyle=this.color;ctx.fillRect(-this.size/2,-this.size/4,this.size,this.size/2);}
    ctx.restore();}
}
function spawnP(x,y,type,n){for(let i=0;i<n&&particles.length<200;i++)particles.push(new Particle(x,y,type));}
function drawStar(ctx,cx,cy,oR,iR,pts){ctx.beginPath();for(let i=0;i<pts*2;i++){let r=i%2===0?oR:iR,a=Math.PI/pts*i-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();}

// ========== WATER EFFECTS ==========
function drawWater(ctx,wy,time,alpha){
  alpha=alpha||1;ctx.save();ctx.globalAlpha=alpha;
  for(let l=0;l<3;l++){ctx.beginPath();for(let x=0;x<=W;x+=3){let y=wy+Math.sin(x*.018+time*1.8+l)*4+Math.sin(x*.045+time*2.8+l*1.5)*2;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    let g=ctx.createLinearGradient(0,wy,0,H);
    if(l===0){g.addColorStop(0,'rgba(79,195,247,0.45)');g.addColorStop(1,'rgba(2,136,209,0.65)');}
    else if(l===1){g.addColorStop(0,'rgba(79,195,247,0.28)');g.addColorStop(1,'rgba(2,136,209,0.45)');}
    else{g.addColorStop(0,'rgba(179,229,252,0.18)');g.addColorStop(1,'rgba(79,195,247,0.28)');}
    ctx.fillStyle=g;ctx.fill();}
  ctx.restore();
}
function drawLightRays(ctx,wy){
  ctx.save();ctx.globalAlpha=.06;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(W*.08+i*W*.18,0);ctx.lineTo(W*.04+i*W*.18,wy+80);ctx.lineTo(W*.12+i*W*.18,wy+80);ctx.fillStyle='#fff';ctx.fill();}
  ctx.restore();
}

// ========== FEIFEI DRAWING ==========
function drawFeifei(ctx,x,y,scale,opts){
  opts=opts||{};
  let{expression='happy',hatOn=true,swimMode=false,bodyAngle=0,armLAngle=0,armRAngle=0,legLAngle=0,legRAngle=0,headTilt=0,shivering=false}=opts;
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  let sx=0,sy=0;if(shivering){sx=Math.sin(Date.now()*.03)*2;sy=Math.cos(Date.now()*.04)*1;}
  ctx.translate(sx,sy);ctx.rotate(bodyAngle);

  // LEGS
  ctx.save();
  // Left leg
  ctx.save();ctx.translate(-13,58);ctx.rotate(legLAngle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4,42);ctx.strokeStyle='#E0A87C';ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.ellipse(-5,46,8,4,.2,0,6.28);ctx.fillStyle='#FFE0B2';ctx.fill();ctx.strokeStyle='#E0A87C';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
  // Right leg
  ctx.save();ctx.translate(13,58);ctx.rotate(legRAngle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(4,42);ctx.strokeStyle='#E0A87C';ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.ellipse(5,46,8,4,-.2,0,6.28);ctx.fillStyle='#FFE0B2';ctx.fill();ctx.strokeStyle='#E0A87C';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
  ctx.restore();

  // BODY
  if(swimMode){
    ctx.beginPath();ctx.moveTo(-19,0);ctx.lineTo(-17,58);ctx.lineTo(17,58);ctx.lineTo(19,0);ctx.closePath();
    ctx.fillStyle='#CE93D8';ctx.fill();ctx.strokeStyle='#AB47BC';ctx.lineWidth=2;ctx.stroke();
    drawHeart(ctx,0,18,7,'#F48FB1');
  }else{
    ctx.beginPath();ctx.moveTo(-21,-5);ctx.lineTo(-19,52);ctx.lineTo(19,52);ctx.lineTo(21,-5);ctx.closePath();
    ctx.fillStyle='#CE93D8';ctx.fill();ctx.strokeStyle='#AB47BC';ctx.lineWidth=2;ctx.stroke();
    // flower pattern
    ctx.save();ctx.globalAlpha=.15;for(let i=0;i<3;i++){drawHeart(ctx,-8+i*8,15+i*10,3,'#F8BBD0');}ctx.restore();
    ctx.beginPath();ctx.arc(0,12,3.5,0,6.28);ctx.fillStyle='#E91E63';ctx.fill();
    ctx.beginPath();ctx.arc(0,28,3.5,0,6.28);ctx.fillStyle='#E91E63';ctx.fill();
    // Yellow skirt
    ctx.beginPath();ctx.moveTo(-19,48);ctx.lineTo(-26,88);ctx.lineTo(26,88);ctx.lineTo(19,48);ctx.closePath();
    ctx.fillStyle='#FFF176';ctx.fill();ctx.strokeStyle='#FDD835';ctx.lineWidth=1.5;ctx.stroke();
  }

  // ARMS
  ctx.save();ctx.translate(-21,10);ctx.rotate(armLAngle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-6,28);ctx.strokeStyle=swimMode?'#E0A87C':'#CE93D8';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(-6,31,5.5,0,6.28);ctx.fillStyle='#FFE0B2';ctx.fill();
  ctx.restore();
  ctx.save();ctx.translate(21,10);ctx.rotate(armRAngle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(6,28);ctx.strokeStyle=swimMode?'#E0A87C':'#CE93D8';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(6,31,5.5,0,6.28);ctx.fillStyle='#FFE0B2';ctx.fill();
  ctx.restore();

  // HEAD
  ctx.save();ctx.rotate(headTilt);
  // Back hair
  ctx.beginPath();ctx.moveTo(-19,2);ctx.quadraticCurveTo(-28,32,-22,60);ctx.strokeStyle='#2C2C2C';ctx.lineWidth=14;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(19,2);ctx.quadraticCurveTo(28,32,22,60);ctx.strokeStyle='#2C2C2C';ctx.lineWidth=14;ctx.stroke();
  // Head
  ctx.beginPath();ctx.arc(0,-5,23,0,6.28);ctx.fillStyle='#FFE0B2';ctx.fill();ctx.strokeStyle='#E0A87C';ctx.lineWidth=1.5;ctx.stroke();
  // Expression
  drawExpression(ctx,0,-5,expression);
  // Hat
  if(hatOn){ctx.save();ctx.rotate(Math.sin(Date.now()*.002)*.06);
    ctx.beginPath();ctx.ellipse(0,-24,26,11,0,Math.PI,0);ctx.fillStyle='#5C6BC0';ctx.fill();ctx.strokeStyle='#3F51B5';ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.ellipse(0,-19,32,8,0,0,6.28);ctx.fillStyle='#5C6BC0';ctx.fill();ctx.strokeStyle='#3F51B5';ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.ellipse(0,-22,26,3.5,0,0,6.28);ctx.fillStyle='#3F51B5';ctx.fill();
    // Grid pattern
    for(let i=-22;i<22;i+=7){ctx.beginPath();ctx.moveTo(i,-28);ctx.lineTo(i,-18);ctx.strokeStyle='rgba(63,81,181,0.25)';ctx.lineWidth=.5;ctx.stroke();}
    for(let j=-27;j<-18;j+=7){ctx.beginPath();ctx.moveTo(-24,j);ctx.lineTo(24,j);ctx.stroke();}
    // Heart
    drawHeart(ctx,9,-28,5,'#F48FB1');
    ctx.restore();
  }
  // Front hair
  ctx.beginPath();ctx.moveTo(-16,-16);ctx.quadraticCurveTo(-20,8,-17,18);ctx.strokeStyle='#2C2C2C';ctx.lineWidth=5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(16,-16);ctx.quadraticCurveTo(20,8,17,18);ctx.strokeStyle='#2C2C2C';ctx.lineWidth=5;ctx.stroke();
  ctx.restore(); // head
  ctx.restore(); // main
}

function drawHeart(ctx,x,y,s,c){ctx.save();ctx.translate(x,y);ctx.beginPath();ctx.moveTo(0,s*.3);ctx.bezierCurveTo(-s,-s*.3,-s*.5,-s,0,-s*.4);ctx.bezierCurveTo(s*.5,-s,s,-s*.3,0,s*.3);ctx.fillStyle=c;ctx.fill();ctx.restore();}

function drawExpression(ctx,cx,cy,expr){
  ctx.save();let ex=cx,ey=cy;
  switch(expr){
    case 'scared':
      ctx.beginPath();ctx.arc(ex-8,ey-2,4.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(ex+8,ey-2,4.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(ex-7,ey-3,2,0,6.28);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(ex+9,ey-3,2,0,6.28);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.moveTo(ex-13,ey-10);ctx.lineTo(ex-3,ey-7);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+13,ey-10);ctx.lineTo(ex+3,ey-7);ctx.stroke();
      ctx.beginPath();ctx.ellipse(ex,ey+9,4,5.5,0,0,6.28);ctx.fillStyle='#E57373';ctx.fill();
      ctx.beginPath();ctx.arc(ex-13,ey+5,4.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      ctx.beginPath();ctx.arc(ex+13,ey+5,4.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      // tear
      ctx.beginPath();ctx.ellipse(ex-12,ey+2,2,3,0,0,6.28);ctx.fillStyle='rgba(79,195,247,0.6)';ctx.fill();
      break;
    case 'struggling':
      ctx.beginPath();ctx.moveTo(ex-12,ey-1);ctx.quadraticCurveTo(ex-7,ey-5,ex-3,ey-1);ctx.strokeStyle='#333';ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+3,ey-1);ctx.quadraticCurveTo(ex+7,ey-5,ex+12,ey-1);ctx.stroke();
      ctx.beginPath();ctx.ellipse(ex,ey+9,7,9,0,0,6.28);ctx.fillStyle='#E57373';ctx.fill();ctx.strokeStyle='#C62828';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#4FC3F7';ctx.beginPath();ctx.ellipse(ex+16,ey-6,2,3.5,.3,0,6.28);ctx.fill();
      break;
    case 'focused':
      ctx.beginPath();ctx.arc(ex-8,ey-1,3.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(ex+8,ey-1,3.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.moveTo(ex-12,ey-8);ctx.lineTo(ex-3,ey-6);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+12,ey-8);ctx.lineTo(ex+3,ey-6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex-5,ey+8);ctx.lineTo(ex+5,ey+8);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(ex-13,ey+4,3.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.35)';ctx.fill();
      ctx.beginPath();ctx.arc(ex+13,ey+4,3.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.35)';ctx.fill();
      break;
    case 'surprised':
      ctx.beginPath();ctx.arc(ex-8,ey-1,5.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(ex+8,ey-1,5.5,0,6.28);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(ex-7,ey-2,2.5,0,6.28);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(ex+9,ey-2,2.5,0,6.28);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(ex,ey+9,4.5,0,6.28);ctx.fillStyle='#E57373';ctx.fill();
      ctx.beginPath();ctx.arc(ex-14,ey+4,5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      ctx.beginPath();ctx.arc(ex+14,ey+4,5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      break;
    case 'proud':
      ctx.beginPath();ctx.moveTo(ex-12,ey);ctx.quadraticCurveTo(ex-7,ey+4,ex-3,ey);ctx.strokeStyle='#333';ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+3,ey);ctx.quadraticCurveTo(ex+7,ey+4,ex+12,ey);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex-5,ey+8);ctx.quadraticCurveTo(ex,ey+12,ex+6,ey+8);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(ex-13,ey+4,4,0,6.28);ctx.fillStyle='rgba(255,138,128,0.4)';ctx.fill();
      ctx.beginPath();ctx.arc(ex+13,ey+4,4,0,6.28);ctx.fillStyle='rgba(255,138,128,0.4)';ctx.fill();
      break;
    case 'happy':default:
      ctx.beginPath();ctx.moveTo(ex-12,ey);ctx.quadraticCurveTo(ex-7,ey+5,ex-3,ey);ctx.strokeStyle='#333';ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+3,ey);ctx.quadraticCurveTo(ex+7,ey+5,ex+12,ey);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex-7,ey+7);ctx.quadraticCurveTo(ex,ey+14,ex+7,ey+7);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#E57373';ctx.fill();
      ctx.beginPath();ctx.arc(ex-13,ey+5,4.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      ctx.beginPath();ctx.arc(ex+13,ey+5,4.5,0,6.28);ctx.fillStyle='rgba(255,138,128,0.5)';ctx.fill();
      break;
  }
  ctx.restore();
}

// ========== TOUCH SYSTEM ==========
const touch={isDown:false,downTime:0,x:0,y:0,startX:0,startY:0,lastX:0,lastY:0,prevX:0,prevY:0,history:[]};
function tpos(e){let t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
C.addEventListener('touchstart',function(e){e.preventDefault();let p=tpos(e);touch.isDown=true;touch.downTime=Date.now();touch.x=p.x;touch.y=p.y;touch.startX=p.x;touch.startY=p.y;touch.lastX=p.x;touch.lastY=p.y;touch.prevX=p.x;touch.prevY=p.y;touch.history=[{x:p.x,y:p.y,t:Date.now()}];if(game.onTouchStart)game.onTouchStart(touch);},{passive:false});
C.addEventListener('touchmove',function(e){e.preventDefault();let p=tpos(e);touch.prevX=touch.lastX;touch.prevY=touch.lastY;touch.x=p.x;touch.y=p.y;touch.lastX=p.x;touch.lastY=p.y;touch.history.push({x:p.x,y:p.y,t:Date.now()});if(touch.history.length>30)touch.history.shift();if(game.onTouchMove)game.onTouchMove(touch);},{passive:false});
C.addEventListener('touchend',function(e){e.preventDefault();if(game.onTouchEnd)game.onTouchEnd(touch);touch.isDown=false;},{passive:false});
C.addEventListener('mousedown',function(e){touch.isDown=true;touch.downTime=Date.now();touch.x=e.clientX;touch.y=e.clientY;touch.startX=e.clientX;touch.startY=e.clientY;touch.lastX=e.clientX;touch.lastY=e.clientY;touch.prevX=e.clientX;touch.prevY=e.clientY;touch.history=[{x:e.clientX,y:e.clientY,t:Date.now()}];if(game.onTouchStart)game.onTouchStart(touch);});
C.addEventListener('mousemove',function(e){if(!touch.isDown)return;touch.prevX=touch.lastX;touch.prevY=touch.lastY;touch.x=e.clientX;touch.y=e.clientY;touch.lastX=e.clientX;touch.lastY=e.clientY;touch.history.push({x:e.clientX,y:e.clientY,t:Date.now()});if(touch.history.length>30)touch.history.shift();if(game.onTouchMove)game.onTouchMove(touch);});
C.addEventListener('mouseup',function(e){if(game.onTouchEnd)game.onTouchEnd(touch);touch.isDown=false;});

// ========== GAME STATE ==========
const game={scene:'title',currentLevel:0,levelPhase:'demo',levelTimer:0,phaseTimer:0,totalMistakes:0,levelStars:[0,0,0,0,0,0,0,0],time:0,onTouchStart:null,onTouchMove:null,onTouchEnd:null,transition:null,L:{},_ui:{}};

function saveGame(){try{localStorage.setItem('feifei_swim',JSON.stringify({currentLevel:game.currentLevel,levelStars:game.levelStars,totalMistakes:game.totalMistakes}));}catch(e){}}
function loadGame(){try{let d=JSON.parse(localStorage.getItem('feifei_swim'));if(d){game.currentLevel=d.currentLevel||0;game.levelStars=d.levelStars||[0,0,0,0,0,0,0,0];game.totalMistakes=d.totalMistakes||0;}}catch(e){}}
loadGame();

// ========== UI HELPERS ==========
function drawRR(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawBtn(ctx,x,y,w,h,text,bg,fg){ctx.save();drawRR(ctx,x,y,w,h,10);ctx.fillStyle=bg||'#FFB74D';ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=fg||'#333';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x+w/2,y+h/2);ctx.restore();}
function inRect(px,py,r){return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}
function drawBubble(ctx,x,y,text,mw){mw=mw||180;ctx.save();ctx.font='13px sans-serif';let lines=wrapT(ctx,text,mw-20);let lh=19,bh=lines.length*lh+16,bw=mw;let bx=x-bw/2,by=y-bh;drawRR(ctx,bx,by,bw,bh,12);ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.moveTo(x-8,by+bh);ctx.lineTo(x,by+bh+10);ctx.lineTo(x+8,by+bh);ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();ctx.beginPath();ctx.moveTo(x-8,by+bh);ctx.lineTo(x,by+bh+10);ctx.lineTo(x+8,by+bh);ctx.strokeStyle='#e0e0e0';ctx.stroke();ctx.fillStyle='#333';ctx.textAlign='center';ctx.textBaseline='top';lines.forEach((l,i)=>ctx.fillText(l,x,by+8+i*lh));ctx.restore();}
function wrapT(ctx,text,mw){let chars=text.split(''),lines=[],line='';for(let c of chars){if(ctx.measureText(line+c).width>mw){lines.push(line);line=c;}else line+=c;}if(line)lines.push(line);return lines;}
function drawProgress(ctx,x,y,w,h,p,col){ctx.save();drawRR(ctx,x,y,w,h,h/2);ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();if(p>0){drawRR(ctx,x,y,Math.max(h,w*clamp(p,0,1)),h,h/2);ctx.fillStyle=col||'#4FC3F7';ctx.fill();}ctx.restore();}

    if(game.phaseTimer<.5)spawnP(W*.5,H*.35,'star',3);
    if(game.phaseTimer>2.5)showComplete();
  }
}
(function(){let _i=initL7;initL7=function(){_i();game.onTouchStart=function(t){let L=game.L;if(L.phase==='play'){if(L.showBtns&&game._l7btns){for(let i=0;i<4;i++){let b=game._l7btns[i];if(inRect(t.x,t.y,b)){if(i===L.curBt&&L.btTimer<=L.btWindow){L.btHit=true;L.dist+=L.curBt===3?1.5:.5;L.fb=L.curBt===3?'完美蹬夹！':'不错！';L.fbT=.5;spawnP(t.x,t.y,'star',3);if(L.curBt===3)spawnP(W*.3+20,H*.5,'splash',5);advBt7();}else{L.fb='顺序错了！';L.fbT=.5;L.combo=0;game.totalMistakes++;}break;}}}else{if(L.btTimer<=L.btWindow){L.btHit=true;L.dist+=L.curBt===3?1.5:.5;L.fb=L.curBt===3?'完美！':'不错！';L.fbT=.5;spawnP(t.x,t.y,'star',3);if(L.curBt===3)spawnP(W*.3+20,H*.5,'splash',5);advBt7();}else{L.fb='太快了！';L.fbT=.5;game.totalMistakes++;}}}};game.onTouchMove=function(){};game.onTouchEnd=function(){};};})();

// ========== LEVEL 8: FINAL COMBO ==========
function initL8(){game.L={phase:'demo',demoStep:0,demoTimer:0,seq:['划手','吸气','收腿','蹬夹','滑行'],curSt:0,stTimer:0,stWindow:1.4,stHit:false,dist:0,target:25,fb:'',fbT:0,showGuide:true,round:0,sprint:false};game.onTouchStart=null;game.onTouchMove=null;game.onTouchEnd=null;}
function updateL8(dt){let L=game.L;if(L.phase==='demo'){L.demoTimer+=dt;if(L.demoTimer>2.5){L.demoTimer=0;L.demoStep++;if(L.demoStep>=2)L.phase='play';}}else if(L.phase==='play'){L.stTimer+=dt;if(L.curSt===4&&L.stTimer>.7){advSt8();}else if(L.stTimer>L.stWindow&&!L.stHit&&L.curSt!==4){L.fb='太慢了！';L.fbT=.5;game.totalMistakes++;advSt8();}if(L.dist>=20&&!L.sprint)L.sprint=true;if(L.dist>=L.target){L.phase='success';game.phaseTimer=0;}if(L.fbT>0)L.fbT-=dt;if(L.round>=3)L.showGuide=false;}else if(L.phase==='success'){game.phaseTimer+=dt;}}
function advSt8(){let L=game.L;L.curSt=(L.curSt+1)%5;L.stTimer=0;L.stHit=false;if(L.curSt===0)L.round++;}
function drawL8(){let L=game.L,t=game.time;
  let g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#B3E5FC');g.addColorStop(.3,'#4FC3F7');g.addColorStop(1,'#01579B');X.fillStyle=g;X.fillRect(0,0,W,H);
  let wy=H*.3;drawWater(X,wy,t);
  // Lane ropes
  for(let i=0;i<2;i++){let ly=H*.33+i*H*.14;for(let x=0;x<W;x+=18){X.beginPath();X.arc(x+Math.sin(t+x*.01)*2,ly,3,0,6.28);X.fillStyle=i===0?'#FFB74D':'#4FC3F7';X.fill();}}
  drawProgress(X,W*.04,H*.03,W*.92,12,L.dist/L.target,L.sprint?'#FF6B6B':'#4CAF50');
  X.fillStyle='#fff';X.font='bold 12px sans-serif';X.textAlign='center';X.fillText(Math.floor(L.dist)+'m / 25m',W/2,H*.03+8);

  let fx=W*.35,fy=H*.4;
  if(L.phase==='demo'){
    if(L.demoStep===0){drawFeifei(X,fx,fy,.6,{expression:'struggling',hatOn:true,swimMode:true,armLAngle:Math.sin(t*8)*.5,armRAngle:-Math.sin(t*8)*.5,legLAngle:Math.sin(t*6)*.3,legRAngle:-Math.sin(t*6)*.3});X.fillStyle='rgba(255,255,255,0.85)';X.font='bold 14px sans-serif';X.textAlign='center';X.fillText('❌ 手脚同时动=互相打架=游泳界内卷',W/2,H*.12);}
    else{drawFeifei(X,fx,fy,.6,{expression:'struggling',hatOn:true,swimMode:true,headTilt:Math.sin(t*7)*.5,armLAngle:Math.sin(t*5)*.7,legLAngle:Math.cos(t*6)*.4});X.fillStyle='rgba(255,255,255,0.85)';X.font='bold 14px sans-serif';X.textAlign='center';X.fillText('❌ CPU过载=单核处理器跑多线程=死机',W/2,H*.12);}
  }else if(L.phase==='play'){
    let expr=L.sprint?'happy':L.curSt<=1?'focused':'happy';
    let aa=L.curSt===0?.6:L.curSt===4?-.8:0,la=L.curSt===3?-.5:L.curSt===4?0:.2;
    drawFeifei(X,fx,fy,.6,{expression:expr,hatOn:true,swimMode:true,armLAngle:aa,armRAngle:-aa,legLAngle:la,legRAngle:-la,headTilt:L.curSt===1?-.3:0});
    drawBubble(X,fx+20,fy-60,'来吧。这次我是——水鸭子！……水鸭子是不是有点难听？',175);
    // Guide track
    if(L.showGuide){
      let stepW=W*.17,tw=stepW*5,sx=(W-tw)/2,ty=H*.74,th=38;
      let cols=['#FF8A65','#4FC3F7','#81C784','#FFB74D','#CE93D8'];
      for(let i=0;i<5;i++){let bx=sx+i*stepW;let act=i===L.curSt;drawRR(X,bx+2,ty,stepW-4,th,8);X.fillStyle=act?cols[i]:'rgba(255,255,255,0.12)';X.fill();if(act){X.save();X.globalAlpha=.25+Math.sin(t*8)*.15;drawRR(X,bx-1,ty-3,stepW+2,th+6,10);X.strokeStyle=cols[i];X.lineWidth=2;X.stroke();X.restore();}X.fillStyle=act?'#fff':'rgba(255,255,255,0.4)';X.font='bold 12px sans-serif';X.textAlign='center';X.fillText(L.seq[i],bx+stepW/2,ty+th/2+4);}
    }else{
      X.fillStyle='rgba(255,255,255,0.55)';X.font='12px sans-serif';X.textAlign='center';X.fillText('凭节奏操作！划手→吸气→收腿→蹬夹→滑行',W/2,H*.77);
    }
    // Touch zones
    let zy=H*.84,zh=44;
    let zones=[{l:'👆 划手',x:W*.03,w:W*.3},{l:'👆 吸气',x:W*.35,w:W*.3},{l:'👇 蹬夹(长按)',x:W*.67,w:W*.3}];
    game._l8zones=zones.map(z=>({x:z.x,y:zy,w:z.w,h:zh}));
    zones.forEach(z=>{drawRR(X,z.x,zy,z.w,zh,8);X.fillStyle='rgba(255,255,255,0.08)';X.fill();X.strokeStyle='rgba(255,255,255,0.25)';X.lineWidth=1;X.stroke();X.fillStyle='rgba(255,255,255,0.55)';X.font='12px sans-serif';X.textAlign='center';X.fillText(z.l,z.x+z.w/2,zy+zh/2+4);});
    if(L.fbT>0){X.fillStyle='rgba(255,255,255,0.9)';X.font='bold 16px sans-serif';X.textAlign='center';X.fillText(L.fb,W/2,H*.67);}
    if(L.sprint){X.save();X.globalAlpha=.06+Math.sin(t*4)*.03;X.fillStyle='#FFD54F';X.fillRect(0,0,W,H);X.restore();}
  }else if(L.phase==='success'){
    if(game.phaseTimer<3){
      drawFeifei(X,W*.5,H*.4,1,{expression:'happy',hatOn:true,swimMode:true,armLAngle:-1,armRAngle:-1});
      spawnP(rand(0,W),rand(0,H*.5),'confetti',2);spawnP(rand(0,W),rand(0,H*.5),'star',1);
      X.fillStyle='#FFD54F';X.font='bold 30px sans-serif';X.textAlign='center';X.fillText('我会游泳了！！！',W/2,H*.14);
    }else{
      // Ending scene - land Feifei
      let g2=X.createLinearGradient(0,0,0,H);g2.addColorStop(0,'#E8EAF6');g2.addColorStop(.5,'#C5CAE9');g2.addColorStop(1,'#9FA8DA');X.fillStyle=g2;X.fillRect(0,0,W,H);
      drawWater(X,H*.68,t,.3);
      if(Math.random()<.08)spawnP(rand(0,W),rand(0,H*.3),'confetti',1);
      drawFeifei(X,W*.5,H*.42,1.2,{expression:'happy',hatOn:true});
      X.fillStyle='#333';X.font='14px sans-serif';X.textAlign='center';
      let msg=['谢谢你没有在我每次犯蠢的时候放弃我。','说实话，我最怕的不是水，是觉得自己学不会。','但现在我知道了——','学不会不是因为笨，是因为没人让你笑着学。','','所以如果你也是旱鸭子——','下次去泳池的时候，想想我菲菲。','连我都能学会，你一定也行。'];
      let sy=H*.06;msg.forEach((l,i)=>X.fillText(l,W/2,sy+i*20));
      let bx=(W-110)/2,by=H*.88;drawBtn(X,bx,by,110,40,'再玩一次','#FF8A65','#fff');
      game._replayBtn={x:bx,y:by,w:110,h:40};
    }
  }
}
(function(){let _i=initL8;initL8=function(){_i();let lpT=0,isLP=false;game.onTouchStart=function(t){let L=game.L;if(L.phase==='play'){isLP=false;lpT=0;}else if(L.phase==='success'&&game.phaseTimer>3&&game._replayBtn&&inRect(t.x,t.y,game._replayBtn)){game.scene='title';game.onTouchStart=null;game.onTouchMove=null;game.onTouchEnd=null;}};game.onTouchMove=function(){if(touch.isDown&&game.L.phase==='play'){lpT+=.016;if(lpT>.35)isLP=true;}};game.onTouchEnd=function(t){let L=game.L;if(L.phase==='play'){if(L.curSt===4)return;let zy=H*.84,zh=44;let hz=-1;if(game._l8zones){for(let i=0;i<3;i++){if(inRect(t.x,t.y,game._l8zones[i])){hz=i;break;}}}else{hz=Math.floor((t.x-W*.03)/(W*.33));hz=clamp(hz,0,2);}
      let ok=false;let st=L.curSt;
      if(st===0&&hz===0)ok=true;if(st===1&&hz===1)ok=true;if(st===2&&hz===2)ok=true;if(st===3&&hz===2&&isLP)ok=true;
      if(ok){L.stHit=true;let d=st===3?2.5:st===4?0:1.2;L.dist+=d;L.fb=['完美划手！','好呼吸！','收腿！','漂亮蹬夹！','滑行~'][st];L.fbT=.5;spawnP(t.x,t.y,'star',3);if(st===3)spawnP(W*.35+20,H*.5,'splash',8);advSt8();}else{L.fb='节奏乱了！';L.fbT=.5;game.totalMistakes++;}}};};})();

// ========== LEVEL MANAGER ==========
const L_INIT=[initL1,initL2,initL3,initL4,initL5,initL6,initL7,initL8];
const L_UPD=[updateL1,updateL2,updateL3,updateL4,updateL5,updateL6,updateL7,updateL8];
const L_DRW=[drawL1,drawL2,drawL3,drawL4,drawL5,drawL6,drawL7,drawL8];

function startLevel(i){game.currentLevel=i;game.scene='level';game.levelPhase='demo';game.phaseTimer=0;game.L={};L_INIT[i]();}

function showComplete(){
  if(game.scene!=='level')return;
  let ms=game.totalMistakes,stars=ms<3?3:ms<6?2:1;
  game.levelStars[game.currentLevel]=Math.max(game.levelStars[game.currentLevel],stars);
  saveGame();game.scene='levelComplete';game.phaseTimer=0;
  game.onTouchStart=null;game.onTouchMove=null;game.onTouchEnd=null;
  spawnP(W/2,H/2,'confetti',25);spawnP(W/2,H/2,'star',12);
}

// ========== SCENES ==========
function drawTitle(){
  let t=game.time;
  let g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#E3F2FD');g.addColorStop(.5,'#B3E5FC');g.addColorStop(1,'#4FC3F7');X.fillStyle=g;X.fillRect(0,0,W,H);
  drawWater(X,H*.63,t,.5);
  if(Math.random()<.04)spawnP(rand(0,W),H*.65,'bubble',1);
  X.save();X.fillStyle='#0277BD';X.font='bold 34px sans-serif';X.textAlign='center';
  X.fillText('🏊 菲菲学游泳',W/2,H*.18+Math.sin(t*2)*4);
  X.font='15px sans-serif';X.fillStyle='#0288D1';X.fillText('"笑着操作，玩着就会"',W/2,H*.18+32);
  X.restore();
  drawFeifei(X,W/2,H*.47,1.2,{expression:'happy',hatOn:true});
  let bw=155,bh=48,bx=(W-bw)/2,by=H*.71;
  drawBtn(X,bx,by,bw,bh,'开始游戏','#FF8A65','#fff');
  game._titleBtn={x:bx,y:by,w:bw,h:bh};
  game.onTouchStart=function(t){if(game._titleBtn&&inRect(t.x,t.y,game._titleBtn)){game.scene='levelSelect';game.onTouchStart=null;}};
}

function drawLevelSel(){
  X.fillStyle='#E8EAF6';X.fillRect(0,0,W,H);
  X.fillStyle='#3F51B5';X.font='bold 20px sans-serif';X.textAlign='center';X.fillText('选择关卡',W/2,H*.055);
  let cols=2,bw=(W-50)/cols,bh=65,gap=10,sy=H*.1;
  game._lvBtns=[];
  for(let i=0;i<8;i++){let col=i%cols,row=Math.floor(i/cols);let bx=20+col*(bw+gap),by=sy+row*(bh+gap);
    let ok=i===0||game.levelStars[i-1]>0,st=game.levelStars[i];
    drawRR(X,bx,by,bw,bh,10);X.fillStyle=ok?'#fff':'#BDBDBD';X.fill();X.strokeStyle=ok?'#7986CB':'#9E9E9E';X.lineWidth=1.5;X.stroke();
    X.fillStyle=ok?'#333':'#999';X.font='bold 13px sans-serif';X.textAlign='center';X.fillText('第'+(i+1)+'关',bx+bw/2,by+22);
    X.font='11px sans-serif';X.fillText(LEVEL_NAMES[i],bx+bw/2,by+38);
    let ss='';for(let s=0;s<3;s++)ss+=s<st?'⭐':'☆';X.font='11px sans-serif';X.fillText(ss,bx+bw/2,by+53);
    if(!ok){X.fillStyle='rgba(0,0,0,0.25)';X.font='18px sans-serif';X.fillText('🔒',bx+bw/2,by+22);}
    game._lvBtns.push({x:bx,y:by,w:bw,h:bh,idx:i,ok});
  }
  game.onTouchStart=function(t){for(let b of game._lvBtns){if(b.ok&&inRect(t.x,t.y,b)){startLevel(b.idx);break;}}};
}

function drawLevelScene(){
  let i=game.currentLevel;L_UPD[i](0.016);L_DRW[i]();
  // Top bar
  X.save();X.fillStyle='rgba(0,0,0,0.35)';X.fillRect(0,0,W,28);
  X.fillStyle='#fff';X.font='bold 12px sans-serif';X.textAlign='left';X.fillText('第'+(i+1)+'关: '+LEVEL_NAMES[i],10,18);
  X.textAlign='right';X.fillText('返回 →',W-10,18);X.restore();
  let origTS=game.onTouchStart;
  game.onTouchStart=function(t){if(t.y<28&&t.x>W-55){game.scene='levelSelect';game.onTouchStart=null;game.onTouchMove=null;game.onTouchEnd=null;return;}if(origTS)origTS(t);};
}

function drawLevelComp(){
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
  let cw=W*.82,ch=H*.48,cx=(W-cw)/2,cy=(H-ch)/2;
  drawRR(X,cx,cy,cw,ch,15);X.fillStyle='#fff';X.fill();
  X.fillStyle='#FF8A65';X.font='bold 22px sans-serif';X.textAlign='center';X.fillText('🎉 过关！',W/2,cy+35);
  X.fillStyle='#333';X.font='15px sans-serif';X.fillText(LEVEL_NAMES[game.currentLevel],W/2,cy+60);
  let stars=game.levelStars[game.currentLevel],ss='';for(let s=0;s<3;s++)ss+=s<stars?'⭐':'☆';
  X.font='28px sans-serif';X.fillText(ss,W/2,cy+95);
  drawFeifei(X,W/2,cy+150,.55,{expression:'happy',hatOn:true});
  X.fillStyle='#666';X.font='12px sans-serif';X.fillText(LEVEL_QUOTES[game.currentLevel],W/2,cy+195);
  let bw=115,bh=38,gap=12,by=cy+ch-50;
  let b1x=W/2-bw-gap/2,b2x=W/2+gap/2;
  drawBtn(X,b1x,by,bw,bh,'💡 小知识','#4FC3F7','#fff');
  drawBtn(X,b2x,by,bw,bh,'下一关 →','#FF8A65','#fff');
  game.onTouchStart=function(t){if(inRect(t.x,t.y,{x:b1x,y:by,w:bw,h:bh})){game.scene='knowledge';game.phaseTimer=0;game.onTouchStart=null;}else if(inRect(t.x,t.y,{x:b2x,y:by,w:bw,h:bh})){if(game.currentLevel<7)startLevel(game.currentLevel+1);else{game.scene='ending';game.phaseTimer=0;game.onTouchStart=null;}}};
}

function drawKnowledge(){
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);
  let cw=W*.87,ch=H*.58,cx=(W-cw)/2,cy=(H-ch)/2;
  drawRR(X,cx,cy,cw,ch,15);X.fillStyle='#FFF8E1';X.fill();X.strokeStyle='#FFB74D';X.lineWidth=2;X.stroke();
  X.fillStyle='#FF8F00';X.font='bold 17px sans-serif';X.textAlign='center';X.fillText('🏊 游泳小知识',W/2,cy+30);
  X.fillStyle='#333';X.font='13px sans-serif';X.textAlign='left';
  let txt=KNOWLEDGE[game.currentLevel],lines=txt.split('\n');
  lines.forEach((l,i)=>X.fillText(l,cx+18,cy+55+i*22,cw-36));
  let bw=95,bh=36,bx=(W-bw)/2,by=cy+ch-48;
  drawBtn(X,bx,by,bw,bh,'知道了！','#FF8A65','#fff');
  game.onTouchStart=function(t){if(inRect(t.x,t.y,{x:bx,y:by,w:bw,h:bh})){game.scene='levelSelect';game.onTouchStart=null;}};
}

function drawEnding(){
  let t=game.time;game.phaseTimer+=.016;
  let g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#E8EAF6');g.addColorStop(.5,'#C5CAE9');g.addColorStop(1,'#9FA8DA');X.fillStyle=g;X.fillRect(0,0,W,H);
  drawWater(X,H*.68,t,.3);
  if(Math.random()<.06)spawnP(rand(0,W),rand(0,H*.3),'confetti',1);
  drawFeifei(X,W*.5,H*.42,1.2,{expression:'happy',hatOn:true});
  X.fillStyle='#333';X.font='14px sans-serif';X.textAlign='center';
  let msg=['谢谢你没有在我每次犯蠢的时候放弃我。','说实话，我最怕的不是水，是觉得自己学不会。','但现在我知道了——','学不会不是因为笨，是因为没人让你笑着学。','','所以如果你也是旱鸭子——','下次去泳池的时候，想想我菲菲。','连我都能学会，你一定也行。','','毕竟，我可是那个以为','"用鼻子在水里呼吸"是可行方案的人。'];
  let sy=H*.06;msg.forEach((l,i)=>X.fillText(l,W/2,sy+i*19));
  let bw=110,bh=38,bx=(W-bw)/2,by=H*.88;
  drawBtn(X,bx,by,bw,bh,'再玩一次','#FF8A65','#fff');
  game.onTouchStart=function(t){if(inRect(t.x,t.y,{x:bx,y:by,w:bw,h:bh})){game.scene='title';game.onTouchStart=null;}};
}

// ========== GAME LOOP ==========
let lastT=0;
function loop(ts){
  let dt=Math.min((ts-lastT)/1000,.05);lastT=ts;game.time=ts/1000;
  particles.forEach(p=>p.update());particles=particles.filter(p=>!p.dead);
  X.clearRect(0,0,W,H);
  switch(game.scene){
    case 'title':drawTitle();break;
    case 'levelSelect':drawLevelSel();break;
    case 'level':drawLevelScene();break;
    case 'levelComplete':drawLevelComp();break;
    case 'knowledge':drawKnowledge();break;
    case 'ending':drawEnding();break;
  }
  particles.forEach(p=>p.draw(X));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
