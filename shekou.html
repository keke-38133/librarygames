<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>人头蛇大战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0f0e17; 
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; 
  min-height: 100vh; 
  font-family: 'Microsoft YaHei', sans-serif;
  color: #fff; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
#gameContainer { position: relative; }
canvas { display: block; border-radius: 8px; box-shadow: 0 0 30px rgba(78,205,196,0.15); }
#titleScreen, #selectScreen, #resultScreen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(15,14,23,0.95); z-index: 10; border-radius: 8px;
}
.hidden { display: none !important; }
.title-text {
  font-size: 52px; font-weight: bold;
  background: linear-gradient(135deg, #FF8C42, #4ECDC4, #FF6B9D, #7BC74D, #9B59B6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 10px; letter-spacing: 8px;
}
.title-sub { font-size: 18px; color: #8888aa; margin-bottom: 40px; }
.start-btn, .replay-btn {
  padding: 14px 50px; font-size: 22px;
  background: linear-gradient(135deg, #4ECDC4, #44a08d);
  border: none; border-radius: 30px; color: #fff;
  cursor: pointer; font-family: 'Microsoft YaHei', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(78,205,196,0.3);
}
.start-btn:hover, .replay-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(78,205,196,0.5); }
.select-title { font-size: 30px; margin-bottom: 25px; color: #ddd; }
.char-grid { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; max-width: 900px; padding: 0 20px; }
.char-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 15px 12px; border-radius: 16px;
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.3s; width: 140px;
}
.char-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); transform: translateY(-3px); }
.char-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.2); margin-bottom: 8px; }
.char-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
.char-desc { font-size: 12px; color: #999; text-align: center; line-height: 1.4; }
.result-title { font-size: 48px; font-weight: bold; margin-bottom: 15px; }
.result-info { font-size: 20px; color: #bbb; margin-bottom: 30px; }
.win { color: #4ECDC4; }
.lose { color: #FF6B9D; }
#pauseOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15,14,23,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 15; border-radius: 8px; gap: 20px;
}
.pause-text { font-size: 42px; color: #4ECDC4; letter-spacing: 6px; }
.pause-btns { display: flex; gap: 16px; margin-top: 10px; }
.pause-btn {
  padding: 10px 30px; font-size: 16px; border: none; border-radius: 20px;
  color: #fff; cursor: pointer; font-family: 'Microsoft YaHei', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s;
}
.pause-btn:hover { transform: scale(1.05); }
.pause-btn.resume { background: linear-gradient(135deg, #4ECDC4, #44a08d); box-shadow: 0 4px 12px rgba(78,205,196,0.3); }
.pause-btn.restart { background: linear-gradient(135deg, #FF8C42, #e67e22); box-shadow: 0 4px 12px rgba(255,140,66,0.3); }
.pause-btn.quit { background: linear-gradient(135deg, #FF6B9D, #e74c8b); box-shadow: 0 4px 12px rgba(255,107,157,0.3); }
.footer { margin-top: 10px; font-size: 12px; color: #555; text-align: center; padding: 5px; }
.footer a { color: #555; text-decoration: none; }
.footer a:hover { color: #888; }

/* 版本选择界面 */
#versionScreen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(15,14,23,0.98); z-index: 20; border-radius: 8px;
}
.version-title {
  font-size: 36px; font-weight: bold;
  background: linear-gradient(135deg, #FF8C42, #4ECDC4, #FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 40px; letter-spacing: 6px;
}
.version-btns { display: flex; flex-direction: column; gap: 20px; }
.version-btn {
  padding: 20px 55px; font-size: 24px;
  border: none; border-radius: 16px; color: #fff;
  cursor: pointer; font-family: 'Microsoft YaHei', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s;
  min-width: 280px; text-align: center;
  line-height: 1.5;
}
.version-btn:hover { transform: scale(1.05); }
.version-btn.pc {
  background: linear-gradient(135deg, #4ECDC4, #44a08d);
  box-shadow: 0 4px 20px rgba(78,205,196,0.4);
}
.version-btn.mobile {
  background: linear-gradient(135deg, #FF8C42, #e67e22);
  box-shadow: 0 4px 20px rgba(255,140,66,0.4);
}
.version-btn-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }

/* D-pad虚拟方向键 */
#dpad {
  display: none; margin-top: 8px;
  position: relative;
  user-select: none; -webkit-user-select: none;
}
#dpad.show { display: flex; flex-direction: column; align-items: center; }
.dpad-row { display: flex; justify-content: center; }
.dpad-btn {
  width: 62px; height: 62px; border-radius: 14px;
  background: rgba(40,40,65,0.7); border: 2px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: manipulation; margin: 2px;
  transition: background 0.1s;
}
.dpad-btn:active { background: rgba(78,205,196,0.5); border-color: #4ECDC4; }
.dpad-spacer { width: 62px; height: 62px; margin: 2px; }
.dpad-pause-row { display: flex; justify-content: center; margin-top: 8px; }
#pauseDpadBtn {
  padding: 10px 32px; border-radius: 22px;
  background: rgba(40,40,65,0.7); border: 2px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 15px; cursor: pointer;
  user-select: none; -webkit-user-select: none; touch-action: manipulation;
  transition: background 0.1s;
}
#pauseDpadBtn:active { background: rgba(155,89,182,0.5); border-color: #9B59B6; }

/* 手机版适配 */
body.mobile-mode { justify-content: flex-start; padding-top: 5px; }
body.mobile-mode .title-text { font-size: 30px; letter-spacing: 4px; }
body.mobile-mode .title-sub { font-size: 14px; margin-bottom: 25px; }
body.mobile-mode .select-title { font-size: 22px; margin-bottom: 15px; }
body.mobile-mode .char-grid { max-width: 340px; gap: 10px; }
body.mobile-mode .char-card { width: 145px; padding: 10px 8px; }
body.mobile-mode .char-avatar { width: 60px; height: 60px; }
body.mobile-mode .char-name { font-size: 15px; }
body.mobile-mode .char-desc { font-size: 11px; }
body.mobile-mode .start-btn, body.mobile-mode .replay-btn { padding: 12px 36px; font-size: 18px; }
body.mobile-mode .result-title { font-size: 32px; }
body.mobile-mode .result-info { font-size: 16px; }
body.mobile-mode .pause-text { font-size: 30px; }
body.mobile-mode .pause-btn { padding: 8px 22px; font-size: 14px; }
body.mobile-mode .footer { font-size: 10px; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="versionScreen">
    <div class="version-title">选择版本</div>
    <div class="version-btns">
      <button class="version-btn pc" id="pcBtn">🖥️ 电脑版<div class="version-btn-sub">键盘操控</div></button>
      <button class="version-btn mobile" id="mobileBtn">📱 手机版<div class="version-btn-sub">触屏操控</div></button>
    </div>
  </div>
  <div id="titleScreen" class="hidden">
    <div class="title-text">人头蛇大战</div>
    <div class="title-sub">选择你的角色，追吃所有对手！</div>
    <button class="start-btn" id="startBtn">开始游戏</button>
  </div>
  <div id="selectScreen" class="hidden">
    <div class="select-title">选择你的角色</div>
    <div class="char-grid" id="charGrid"></div>
  </div>
  <div id="resultScreen" class="hidden">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-info" id="resultInfo"></div>
    <button class="replay-btn" id="replayBtn" style="margin-right:12px;">再来一局</button>
    <button class="replay-btn" id="titleBtn" style="background:linear-gradient(135deg,#9B59B6,#8e44ad);">返回标题</button>
  </div>
  <div id="pauseOverlay" class="hidden">
    <div class="pause-text">暂停中</div>
    <div class="pause-btns">
      <button class="pause-btn resume" id="resumeBtn">继续</button>
      <button class="pause-btn restart" id="restartBtn">重新开始</button>
      <button class="pause-btn quit" id="quitBtn">退出</button>
    </div>
  </div>
</div>
<div id="dpad">
  <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" id="dpadUp">▲</button><div class="dpad-spacer"></div></div>
  <div class="dpad-row"><button class="dpad-btn" id="dpadLeft">◀</button><div class="dpad-spacer"></div><button class="dpad-btn" id="dpadRight">▶</button></div>
  <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" id="dpadDown">▼</button><div class="dpad-spacer"></div></div>
  <div class="dpad-pause-row"><button id="pauseDpadBtn">⏸ 暂停</button></div>
</div>
<div class="footer">

// === 游戏常量 ===
var COLS = 50, ROWS = 34, CELL = 18;
var CANVAS_W = COLS * CELL;   // 900
var CANVAS_H = ROWS * CELL;   // 612
var TICK_MS = 100;             // 游戏逻辑tick间隔(ms)
var GAME_DURATION = 180;       // 游戏时长(秒)
var INITIAL_LENGTH = 10;       // 蛇初始长度
var DX = [0, 1, 0, -1];       // 方向: 上右下左
var DY = [-1, 0, 1, 0];
var OPPOSITE = [2, 3, 0, 1];  // 反方向映射

// === 全局变量 ===
var canvas, ctx;
var gameState = 'title'; // title | select | playing | paused | result
var playerIdx = -1;      // 玩家选择的角色索引
var snakes = [];          // 所有蛇对象
var particles = [];       // 粒子效果数组
var gameTime = 0;         // 游戏已过时间(秒)
var killCount = 0;        // 击杀数
var tickTimer = null;     // 游戏tick定时器
var headImages = [];      // 蛇头小图(60x60)
var selectImages = [];    // 选角大图(150x150)
var touchStartX = 0, touchStartY = 0; // 触屏起点
var fruits = [];          // 场上的果实
var fruitSpawnTimer = 0;  // 果实生成计时器
var FRUIT_SPAWN_INTERVAL = 5; // 每5秒尝试生成一个果实
var FRUIT_MAX = 6;        // 场上最多6个果实
var FRUIT_DURATION = 5;   // 果实效果持续5秒
var FRUIT_SPEED_UP = 2.0; // 加速倍率
var FRUIT_SLOW_DOWN = 0.5; // 减速倍率
var isMobile = false;       // 手机版标记

// === 页面加载初始化 ===
window.onload = function() {
  canvas = document.getElementById('gameCanvas');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  ctx = canvas.getContext('2d');
  
  loadImages();
  buildSelectScreen();
  
  // === 版本选择按钮 ===
  document.getElementById('pcBtn').addEventListener('click', function() {
    isMobile = false;
    document.getElementById('versionScreen').classList.add('hidden');
    document.getElementById('titleScreen').classList.remove('hidden');
  });
  document.getElementById('mobileBtn').addEventListener('click', function() {
    isMobile = true;
    document.body.classList.add('mobile-mode');
    document.getElementById('versionScreen').classList.add('hidden');
    document.getElementById('titleScreen').classList.remove('hidden');
  });
  
  // 标题画面 → 选角画面
  document.getElementById('startBtn').addEventListener('click', function() {
    gameState = 'select';
    document.getElementById('titleScreen').classList.add('hidden');
    document.getElementById('selectScreen').classList.remove('hidden');
  });
  
  // 结果画面 → 选角画面(重玩)
  document.getElementById('replayBtn').addEventListener('click', function() {
    gameState = 'select';
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('selectScreen').classList.remove('hidden');
  });
  
  // 结果画面 → 标题画面
  document.getElementById('titleBtn').addEventListener('click', function() {
    gameState = 'title';
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('titleScreen').classList.remove('hidden');
  });
  
  // 暂停界面按钮
  document.getElementById('resumeBtn').addEventListener('click', function() {
    togglePause();
  });
  document.getElementById('restartBtn').addEventListener('click', function() {
    document.getElementById('pauseOverlay').classList.add('hidden');
    gameState = 'select';
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    document.getElementById('selectScreen').classList.remove('hidden');
  });
  document.getElementById('quitBtn').addEventListener('click', function() {
    document.getElementById('pauseOverlay').classList.add('hidden');
    gameState = 'title';
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    document.getElementById('titleScreen').classList.remove('hidden');
  });
  
  // === D-pad虚拟方向键事件(手机版) ===
  document.getElementById('dpadUp').addEventListener('touchstart', function(e) {
    e.preventDefault(); setPlayerDir(0);
  }, { passive: false });
  document.getElementById('dpadDown').addEventListener('touchstart', function(e) {
    e.preventDefault(); setPlayerDir(2);
  }, { passive: false });
  document.getElementById('dpadLeft').addEventListener('touchstart', function(e) {
    e.preventDefault(); setPlayerDir(3);
  }, { passive: false });
  document.getElementById('dpadRight').addEventListener('touchstart', function(e) {
    e.preventDefault(); setPlayerDir(1);
  }, { passive: false });
  document.getElementById('pauseDpadBtn').addEventListener('touchstart', function(e) {
    e.preventDefault(); togglePause();
  }, { passive: false });
  // D-pad也支持mouse click(调试用)
  document.getElementById('dpadUp').addEventListener('mousedown', function() { setPlayerDir(0); });
  document.getElementById('dpadDown').addEventListener('mousedown', function() { setPlayerDir(2); });
  document.getElementById('dpadLeft').addEventListener('mousedown', function() { setPlayerDir(3); });
  document.getElementById('dpadRight').addEventListener('mousedown', function() { setPlayerDir(1); });
  document.getElementById('pauseDpadBtn').addEventListener('mousedown', function() { togglePause(); });
  
  // 输入事件
  document.addEventListener('keydown', onKeyDown);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  
  // 启动渲染循环
  requestAnimationFrame(renderLoop);
};

// === 设置玩家方向(供D-pad调用) ===
function setPlayerDir(dir) {
  if (gameState !== 'playing') return;
  var snake = snakes[playerIdx];
  if (!snake || !snake.alive) return;
  if (dir !== OPPOSITE[snake.dir]) {
    snake.nextDir = dir;
  }
}

// === 加载所有角色图片 ===
function loadImages() {
  CHARACTERS.forEach(function(ch, i) {
    var imgS = new Image();
    imgS.src = ch.smallSrc;
    headImages[i] = imgS;
    
    var imgL = new Image();

    selectImages[i] = imgL;
  });
}

// === 构建选角界面 ===
function buildSelectScreen() {
  var grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach(function(ch, i) {
    var card = document.createElement('div');
    card.className = 'char-card';
    card.style.borderColor = ch.color + '33';
    card.innerHTML =

      '<div class="char-name" style="color:' + ch.color + '">' + ch.name + '</div>' +
      '<div class="char-desc">' + ch.desc + '</div>';

    });

// === 开始游戏 ===
function startGame() {
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('pauseOverlay').classList.add('hidden');
  
  // 根据版本设置画布参数
  if (isMobile) {
    CELL = Math.min(20, Math.floor(window.innerWidth / 25));
    if (CELL < 10) CELL = 10;
    COLS = Math.floor(window.innerWidth / CELL);
    ROWS = Math.floor((window.innerHeight - 220) / CELL);
    if (COLS < 15) COLS = 15;
    if (ROWS < 20) ROWS = 20;
  } else {
    COLS = 50; ROWS = 34; CELL = 18;
  }
  CANVAS_W = COLS * CELL;
  CANVAS_H = ROWS * CELL;
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  
  // 显示/隐藏D-pad
  if (isMobile) {
    document.getElementById('dpad').classList.add('show');
  } else {
    document.getElementById('dpad').classList.remove('show');
  }
  
  gameState = 'playing';
  gameTime = 0;
  killCount = 0;
  particles = [];
  fruits = [];
  fruitSpawnTimer = 0;
  
  // 初始化5条蛇（位置用比例计算，适配不同画布尺寸）
  snakes = [];
  var spawnPositions = [
    { x: Math.max(5, Math.floor(COLS * 0.1)), y: Math.max(5, Math.floor(ROWS * 0.15)) },   // 左上
    { x: Math.min(COLS - 6, Math.floor(COLS * 0.88)), y: Math.max(5, Math.floor(ROWS * 0.15)) },  // 右上
    { x: Math.max(5, Math.floor(COLS * 0.1)), y: Math.min(ROWS - 6, Math.floor(ROWS * 0.82)) },   // 左下
    { x: Math.min(COLS - 6, Math.floor(COLS * 0.88)), y: Math.min(ROWS - 6, Math.floor(ROWS * 0.82)) },  // 右下
    { x: Math.floor(COLS * 0.5), y: Math.floor(ROWS * 0.5) }     // 中心
  ];
  var spawnDirs = [1, 3, 1, 3, 0]; // 初始移动方向
  
  for (var i = 0; i < 5; i++) {
    var body = [];
    var sp = spawnPositions[i];
    var dir = spawnDirs[i];
    for (var j = 0; j < INITIAL_LENGTH; j++) {
      body.push({
        x: sp.x - DX[dir] * j,
        y: sp.y - DY[dir] * j
      });
    }
    snakes.push({
      id: i,
      charIdx: i,
      body: body,
      dir: dir,
      nextDir: dir,
      alive: true,
      isPlayer: (i === playerIdx),
      // 速度效果
      speedMult: 1.0,
      effectTimer: 0,
      effectType: null,  // null | 'speedup' | 'slowdown'
      tickAccum: 0.0,
      // AI 性格参数
      personality: CHARACTERS[i].personality,
      dirChangeCooldown: 0
    });
  }
  
  // 启动游戏tick
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(gameTick, TICK_MS);
}

// === 游戏逻辑Tick (100ms一次) ===
function gameTick() {
  if (gameState !== 'playing') return;
  
  gameTime += TICK_MS / 1000;
  
  // 检查游戏时间
  if (gameTime >= GAME_DURATION) {
    endGame(false);
    return;
  }
  
  // 更新AI方向决策
  for (var i = 0; i < snakes.length; i++) {
    var s = snakes[i];
    if (!s.alive || s.isPlayer) continue;
    updateAI(s);
  }
  
  // 更新果实效果倒计时
  for (var i = 0; i < snakes.length; i++) {
    var s = snakes[i];
    if (!s.alive || !s.effectType) continue;
    s.effectTimer -= TICK_MS / 1000;
    if (s.effectTimer <= 0) {
      s.effectType = null;
      s.speedMult = 1.0;
    }
  }
  
  // 带速度效果的蛇移动
  for (var i = 0; i < snakes.length; i++) {
    var s = snakes[i];
    if (!s.alive) continue;
    s.tickAccum = (s.tickAccum || 0) + s.speedMult;
    while (s.tickAccum >= 1.0) {
      s.tickAccum -= 1.0;
      moveSnake(s);
    }
  }
  
  // 果实生成
  fruitSpawnTimer += TICK_MS / 1000;
  if (fruitSpawnTimer >= FRUIT_SPAWN_INTERVAL && fruits.length < FRUIT_MAX) {
    fruitSpawnTimer = 0;
    spawnFruit();
  }
  
  // 果实碰撞检测
  checkFruitCollisions();
  
  // 蛇与蛇碰撞检测
  checkCollisions();
  
  // 更新粒子
  updateParticles();
}

// (burst/fatigue已移除，所有蛇统一速度)

// === 移动蛇一格 ===
function moveSnake(snake) {
  if (!snake.alive) return;
  // 应用方向(不能反向)
  if (snake.nextDir !== undefined && OPPOSITE[snake.nextDir] !== snake.dir) {
    snake.dir = snake.nextDir;
  }
  var head = snake.body[0];
  var nx = head.x + DX[snake.dir];
  var ny = head.y + DY[snake.dir];
  // 碰墙则不移动（原地停留）
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  snake.body.unshift({ x: nx, y: ny });
  snake.body.pop();
}

// === AI方向决策 ===
function updateAI(snake) {
  if (snake.dirChangeCooldown > 0) {
    snake.dirChangeCooldown--;
    return;
  }
  
  var head = snake.body[0];
  var player = snakes[playerIdx];
  var p = snake.personality;
  
  // 如果玩家已死，随机漫步
  if (!player || !player.alive) {
    var d = randomWalkDir(snake);
    if (d !== OPPOSITE[snake.dir]) snake.nextDir = d;
    snake.dirChangeCooldown = Math.floor(p.hesitation * 5);
    return;
  }
  
  var pHead = player.body[0];
  var dist = gridDist(head, pHead);
  var makeMistake = Math.random() < p.mistakeProb;
  
  // 计算到玩家的方向
  var dxP = pHead.x - head.x;
  var dyP = pHead.y - head.y;
  
  var bestDir = snake.dir;
  
  if (dist <= p.reactionDist && !makeMistake) {
    // 在感知范围内且没有误判
    if (Math.random() < p.fleeProb) {
      // 逃跑：远离玩家
      if (Math.abs(dxP) >= Math.abs(dyP)) {
        bestDir = dxP > 0 ? 3 : 1; // 玩家在右则往左
      } else {
        bestDir = dyP > 0 ? 0 : 2; // 玩家在下则往上
      }
    } else {
      // 侧向闪避
      if (Math.abs(dxP) >= Math.abs(dyP)) {
        bestDir = dyP >= 0 ? 0 : 2;
        if (bestDir === OPPOSITE[snake.dir]) bestDir = dxP > 0 ? 3 : 1;
      } else {
        bestDir = dxP >= 0 ? 3 : 1;
        if (bestDir === OPPOSITE[snake.dir]) bestDir = dyP > 0 ? 0 : 2;
      }
    }
  } else if (makeMistake) {
    // 误判：朝玩家方向移动
    if (Math.abs(dxP) >= Math.abs(dyP)) {
      bestDir = dxP > 0 ? 1 : 3;
    } else {
      bestDir = dyP > 0 ? 2 : 0;
    }
  } else {
    // 随机漫步+避墙
    bestDir = randomWalkDir(snake);
  }
  
  // 不能反向 + 不能撞墙
  if (bestDir !== OPPOSITE[snake.dir]) {
    var tnx = head.x + DX[bestDir];
    var tny = head.y + DY[bestDir];
    if (tnx >= 0 && tnx < COLS && tny >= 0 && tny < ROWS) {
      snake.nextDir = bestDir;
    } else {
      // 选中的方向会撞墙，找替代方向
      var altDirs = [];
      for (var d = 0; d < 4; d++) {
        if (d === OPPOSITE[snake.dir]) continue;
        var ax = head.x + DX[d];
        var ay = head.y + DY[d];
        if (ax >= 0 && ax < COLS && ay >= 0 && ay < ROWS) altDirs.push(d);
      }
      if (altDirs.length > 0) snake.nextDir = altDirs[Math.floor(Math.random() * altDirs.length)];
    }
  }
  snake.dirChangeCooldown = Math.floor(p.hesitation * 5);
}

// === 随机漫步方向(避墙) ===
function randomWalkDir(snake) {
  var head = snake.body[0];
  var dirs = [];
  for (var d = 0; d < 4; d++) {
    if (d === OPPOSITE[snake.dir]) continue;
    var nx = head.x + DX[d];
    var ny = head.y + DY[d];
    // 出界方向直接排除
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
    var nearWall = nx <= 2 || nx >= COLS - 3 || ny <= 2 || ny >= ROWS - 3;
    if (!nearWall) {
      dirs.push(d);
    } else if (Math.random() > 0.5) {
      dirs.push(d); // 50%概率还是走墙边
    }
  }
  if (dirs.length === 0) {
    for (var d = 0; d < 4; d++) {
      if (d !== OPPOSITE[snake.dir]) dirs.push(d);
    }
  }
  return dirs.length > 0 ? dirs[Math.floor(Math.random() * dirs.length)] : snake.dir;
}

// === 网格距离 ===
function gridDist(a, b) {
  var dx = Math.abs(a.x - b.x);
  var dy = Math.abs(a.y - b.y);
  return dx + dy;
}

// === 碰撞检测 ===
function checkCollisions() {
  var player = snakes[playerIdx];
  if (!player || !player.alive) return;
  var pHead = player.body[0];
  
  // === 玩家蛇头 vs AI蛇 ===
  for (var i = 0; i < snakes.length; i++) {
    if (i === playerIdx || !snakes[i].alive) continue;
    var ai = snakes[i];
    var aiHead = ai.body[0];
    
    // 头碰头: AI整条死亡，玩家大幅增长
    if (pHead.x === aiHead.x && pHead.y === aiHead.y) {
      var gainLen = ai.body.length;
      spawnParticles(aiHead.x, aiHead.y, CHARACTERS[ai.charIdx].color, 30);
      ai.alive = false;
      ai.body = [];
      growSnake(player, gainLen);
      killCount++;
      continue;
    }
    
    // 玩家蛇头碰AI蛇身体: 从碰到节到蛇尾被吃掉
    for (var j = 1; j < ai.body.length; j++) {
      if (pHead.x === ai.body[j].x && pHead.y === ai.body[j].y) {
        var eaten = ai.body.length - j;
        spawnParticles(ai.body[j].x, ai.body[j].y, CHARACTERS[ai.charIdx].color, 15);
        ai.body.splice(j); // 删掉被吃部分
        if (ai.body.length === 0) {
          ai.alive = false;
          killCount++;
        }
        growSnake(player, eaten);
        break;
      }
    }
  }
  
  // === AI蛇头 vs 玩家蛇身体 ===
  for (var i = 0; i < snakes.length; i++) {
    if (i === playerIdx || !snakes[i].alive) continue;
    var ai = snakes[i];
    var aiHead = ai.body[0];
    
    // AI蛇头碰玩家蛇头 = 玩家优势，AI死(已在上面处理)
    // AI蛇头碰玩家身体(非头)
    for (var j = 1; j < player.body.length; j++) {
      if (aiHead.x === player.body[j].x && aiHead.y === player.body[j].y) {
        var lost = player.body.length - j;
        spawnParticles(player.body[j].x, player.body[j].y, CHARACTERS[player.charIdx].color, 15);
        player.body.splice(j); // 玩家丢失被碰节到尾部
        if (player.body.length === 0) {
          player.alive = false;
          endGame(false);
          return;
        }
        break;
      }
    }
  }
  
  // === 检查胜利条件 ===
  var allDead = true;
  for (var i = 0; i < snakes.length; i++) {
    if (i !== playerIdx && snakes[i].alive) { allDead = false; break; }
  }
  if (allDead) endGame(true);
}

// === 蛇身增长 ===
function growSnake(snake, count) {
  for (var g = 0; g < count; g++) {
    var tail = snake.body[snake.body.length - 1];
    snake.body.push({ x: tail.x, y: tail.y });
  }
}

// === 粒子效果 ===
function spawnParticles(gx, gy, color, count) {
  var cx = gx * CELL + CELL / 2;
  var cy = gy * CELL + CELL / 2;
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.02,
      color: color,
      size: 2 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// === 果实系统 ===
function spawnFruit() {
  // 随机位置，避开蛇身和其他果实
  var attempts = 0;
  while (attempts < 50) {
    var fx = Math.floor(Math.random() * (COLS - 4)) + 2;
    var fy = Math.floor(Math.random() * (ROWS - 4)) + 2;
    // 检查是否与蛇身重叠
    var blocked = false;
    for (var i = 0; i < snakes.length; i++) {
      if (!snakes[i].alive) continue;
      for (var j = 0; j < snakes[i].body.length; j++) {
        if (snakes[i].body[j].x === fx && snakes[i].body[j].y === fy) {
          blocked = true; break;
        }
      }
      if (blocked) break;
    }
    // 检查是否与已有果实重叠
    if (!blocked) {
      for (var i = 0; i < fruits.length; i++) {
        if (fruits[i].x === fx && fruits[i].y === fy) {
          blocked = true; break;
        }
      }
    }
    if (!blocked) {
      // 随机类型：加速或减速
      var type = Math.random() < 0.5 ? 'speedup' : 'slowdown';
      fruits.push({ x: fx, y: fy, type: type, born: gameTime });
      return;
    }
    attempts++;
  }
}

function checkFruitCollisions() {
  for (var i = fruits.length - 1; i >= 0; i--) {
    var f = fruits[i];
    for (var j = 0; j < snakes.length; j++) {
      var s = snakes[j];
      if (!s.alive) continue;
      var head = s.body[0];
      if (head.x === f.x && head.y === f.y) {
        // 吃到果实
        if (f.type === 'speedup') {
          s.speedMult = FRUIT_SPEED_UP;
          s.effectType = 'speedup';
          s.effectTimer = FRUIT_DURATION;
        } else {
          s.speedMult = FRUIT_SLOW_DOWN;
          s.effectType = 'slowdown';
          s.effectTimer = FRUIT_DURATION;
        }
        // 粒子效果
        var color = f.type === 'speedup' ? '#00FF88' : '#FF4444';
        for (var k = 0; k < 12; k++) {
          var angle = Math.random() * Math.PI * 2;
          var spd = 1 + Math.random() * 3;
          particles.push({
            x: (f.x + 0.5) * CELL, y: (f.y + 0.5) * CELL,
            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            life: 1.0, decay: 0.03, color: color, size: 3 + Math.random() * 3
          });
        }
        fruits.splice(i, 1);
        break;
      }
    }
  }
}

function drawFruits() {
  for (var i = 0; i < fruits.length; i++) {
    var f = fruits[i];
    var cx = (f.x + 0.5) * CELL;
    var cy = (f.y + 0.5) * CELL;
    var pulse = 1 + Math.sin(gameTime * 4 + i) * 0.15;
    var r = CELL * 0.6 * pulse;
    
    ctx.save();
    // 发光
    var glowColor = f.type === 'speedup' ? 'rgba(0,255,136,' : 'rgba(255,68,68,';
    ctx.shadowColor = f.type === 'speedup' ? '#00FF88' : '#FF4444';
    ctx.shadowBlur = 12;
    
    // 圆形果实
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = f.type === 'speedup' ? '#00FF88' : '#FF4444';
    ctx.fill();
    
    // 图标：加速=闪电↑，减速=蜗牛↓
    ctx.shadowBlur = 0;
    ctx.font = 'bold ' + Math.floor(CELL * 0.7) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(f.type === 'speedup' ? '⚡' : '❄', cx, cy + 1);
    
    ctx.restore();
  }
}

// === 游戏结束 ===
function endGame(won) {
  gameState = 'result';
  if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  
  var resultTitle = document.getElementById('resultTitle');
  var resultInfo = document.getElementById('resultInfo');
  
  if (won) {
    resultTitle.textContent = '胜利！';
    resultTitle.className = 'result-title win';
    var t = Math.floor(gameTime);
    resultInfo.textContent = '用时 ' + Math.floor(t / 60) + '分' + (t % 60) + '秒，消灭了全部对手！';
  } else {
    resultTitle.textContent = '失败';
    resultTitle.className = 'result-title lose';
    var remaining = 0;
    for (var i = 0; i < snakes.length; i++) {
      if (i !== playerIdx && snakes[i].alive) remaining++;
    }
    if (snakes[playerIdx] && !snakes[playerIdx].alive) {
      resultInfo.textContent = '你被吃掉了！还有 ' + remaining + ' 条蛇存活。';
    } else {
      resultInfo.textContent = '时间到！还有 ' + remaining + ' 条蛇存活。';
    }
  }
  document.getElementById('resultScreen').classList.remove('hidden');
}

// === 键盘输入 ===
function onKeyDown(e) {
  if (gameState !== 'playing' && gameState !== 'paused') return;
  var snake = snakes[playerIdx];
  if (!snake || !snake.alive) return;
  
  // R键重新开始
  if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    document.getElementById('pauseOverlay').classList.add('hidden');
    gameState = 'select';
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    document.getElementById('selectScreen').classList.remove('hidden');
    return;
  }
  
  var newDir = -1;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': newDir = 0; break;
    case 'ArrowRight': case 'd': case 'D': newDir = 1; break;
    case 'ArrowDown': case 's': case 'S': newDir = 2; break;
    case 'ArrowLeft': case 'a': case 'A': newDir = 3; break;
    case ' ':
      e.preventDefault();
      togglePause();
      return;
  }
  if (newDir >= 0 && gameState === 'playing') {
    e.preventDefault();
    if (newDir !== OPPOSITE[snake.dir]) {
      snake.nextDir = newDir;
    }
  }
}

// === 触屏输入 ===
function onTouchStart(e) {
  if (gameState !== 'playing') return;
  var t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}

function onTouchMove(e) {
  if (gameState !== 'playing') return;
  e.preventDefault();
  var t = e.touches[0];
  var dx = t.clientX - touchStartX;
  var dy = t.clientY - touchStartY;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
  
  var snake = snakes[playerIdx];
  if (!snake || !snake.alive) return;
  
  var newDir;
  if (Math.abs(dx) > Math.abs(dy)) {
    newDir = dx > 0 ? 1 : 3;
  } else {
    newDir = dy > 0 ? 2 : 0;
  }
  if (newDir !== OPPOSITE[snake.dir]) {
    snake.nextDir = newDir;
  }
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}

// === 暂停/继续 ===
function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pauseOverlay').classList.remove('hidden');
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  } else if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pauseOverlay').classList.add('hidden');
    tickTimer = setInterval(gameTick, TICK_MS);
  }
}

// ==================== 渲染 ====================

// === 渲染主循环 ===
function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (gameState === 'playing' || gameState === 'paused') {
    render();
  }
}

// === 主渲染函数 ===
function render() {
  // 清空画布
  ctx.fillStyle = '#0f0e17';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  
  drawGrid();
  
  // 画果实（在蛇下面）
  drawFruits();
  
  // 先画AI蛇，再画玩家蛇(玩家在最上层)
  for (var i = 0; i < snakes.length; i++) {
    if (i !== playerIdx && snakes[i].alive) drawSnake(snakes[i]);
  }
  if (snakes[playerIdx] && snakes[playerIdx].alive) drawSnake(snakes[playerIdx]);
  
  drawParticles();
  // drawDirectionIndicators(); // 已移除
  drawUI();
}

// === 绘制背景网格 ===
function drawGrid() {
  ctx.strokeStyle = 'rgba(26,25,48,0.5)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, CANVAS_H);
    ctx.stroke();
  }
  for (var y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(CANVAS_W, y * CELL);
    ctx.stroke();
  }
  // 画边框墙
  ctx.strokeStyle = 'rgba(78,205,196,0.4)';
  ctx.lineWidth = 3;
  ctx.strokeRect(1.5, 1.5, CANVAS_W - 3, CANVAS_H - 3);
}

// === 绘制单条蛇 ===
function drawSnake(snake) {
  var ch = CHARACTERS[snake.charIdx];
  var body = snake.body;
  if (body.length === 0) return;
  
  // 速度效果光晕
  var effectGlow = null;
  if (snake.effectType === 'speedup') effectGlow = '#00FF88';
  else if (snake.effectType === 'slowdown') effectGlow = '#FF4444';
  
  // 绘制身体(从尾到头，保证头在最上层)
  for (var i = body.length - 1; i >= 1; i--) {
    var seg = body[i];
    var color = (i % 2 === 0) ? ch.color : ch.color2;
    var x = seg.x * CELL;
    var y = seg.y * CELL;
    var pad = 1;
    
    // 发光效果
    ctx.shadowColor = effectGlow || ch.color;
    ctx.shadowBlur = effectGlow ? 8 : 4;
    ctx.fillStyle = color;
    ctx.beginPath();
    roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  
  // 绘制蛇头: 圆形裁剪 + 真实照片
  var head = body[0];
  var headSize = CELL * 1.5;  // 蛇头是身体的1.5倍
  var hx = head.x * CELL + CELL / 2;
  var hy = head.y * CELL + CELL / 2;
  var hr = headSize / 2;
  
  ctx.save();
  // 创建圆形裁剪路径
  ctx.beginPath();
  ctx.arc(hx, hy, hr, 0, Math.PI * 2);
  ctx.clip();
  
  // 绘制照片(填充圆形区域)
  var img = headImages[snake.charIdx];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, hx - hr, hy - hr, headSize, headSize);
  } else {
    // 图片未加载时用颜色备用
    ctx.fillStyle = ch.color;
    ctx.fill();
  }
  ctx.restore();
  
  // 白色描边(让头像更突出)
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(hx, hy, hr, 0, Math.PI * 2);
  ctx.stroke();
  
  // 玩家星标
  if (snake.isPlayer) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('\u2605', hx, hy - hr - 1);
  }
  
  // 蛇名字(蛇头上方)
  ctx.fillStyle = ch.color;
  ctx.font = '10px Microsoft YaHei, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  var nameY = hy - hr - (snake.isPlayer ? 10 : 2);
  ctx.fillText(ch.name, hx, nameY);
}

// === 圆角矩形路径 ===
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// === 绘制粒子 ===
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// === 方向指示器(指向其他存活蛇) ===
function drawDirectionIndicators() {
  var player = snakes[playerIdx];
  if (!player || !player.alive) return;
  var pHead = player.body[0];
  var margin = 30;
  
  for (var i = 0; i < snakes.length; i++) {
    if (i === playerIdx || !snakes[i].alive) continue;
    var aiHead = snakes[i].body[0];
    var ch = CHARACTERS[snakes[i].charIdx];
    
    // 计算方向
    var dx = aiHead.x - pHead.x;
    var dy = aiHead.y - pHead.y;
    
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 8) continue; // 太近不显示
    
    var angle = Math.atan2(dy * CELL, dx * CELL);
    
    // 在画布边缘画箭头
    var ax = CANVAS_W / 2 + Math.cos(angle) * (CANVAS_W / 2 - margin);
    var ay = CANVAS_H / 2 + Math.sin(angle) * (CANVAS_H / 2 - margin);
    ax = Math.max(margin, Math.min(CANVAS_W - margin, ax));
    ay = Math.max(margin, Math.min(CANVAS_H - margin, ay));
    
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(angle);
    ctx.fillStyle = ch.color;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-6, -7);
    ctx.lineTo(-6, 7);
    ctx.closePath();
    ctx.fill();
    ctx.rotate(-angle);
    ctx.font = '10px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(ch.name, 0, -12);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// === 绘制UI信息 ===
function drawUI() {
  var player = snakes[playerIdx];
  
  // 顶部中央: 倒计时
  var remaining = Math.max(0, GAME_DURATION - Math.floor(gameTime));
  var min = Math.floor(remaining / 60);
  var sec = remaining % 60;
  var timeStr = min + ':' + (sec < 10 ? '0' : '') + sec;
  
  ctx.font = 'bold 24px Microsoft YaHei, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // 最后30秒红色闪烁
  if (remaining <= 30) {
    ctx.fillStyle = (Math.floor(gameTime * 3) % 2 === 0) ? '#FF4444' : '#FF8888';
  } else {
    ctx.fillStyle = '#ffffff';
  }
  ctx.fillText(timeStr, CANVAS_W / 2, 6);
  
  // 左上角: 击杀数/剩余蛇数
  var aliveCount = 0;
  for (var i = 0; i < snakes.length; i++) {
    if (i !== playerIdx && snakes[i].alive) aliveCount++;
  }
  ctx.font = '15px Microsoft YaHei, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#4ECDC4';
  ctx.fillText('击杀: ' + killCount, 10, 6);
  ctx.fillStyle = '#FF6B9D';
  ctx.fillText('剩余: ' + aliveCount, 10, 26);
  
  // 右上角: 玩家蛇长度 + 效果状态
  if (player && player.alive) {
    ctx.textAlign = 'right';
    ctx.fillStyle = CHARACTERS[player.charIdx].color;
    ctx.fillText('长度: ' + player.body.length, CANVAS_W - 10, 6);
    ctx.font = '13px Microsoft YaHei, sans-serif';
    ctx.fillStyle = '#aaa';
    var nameStr = CHARACTERS[player.charIdx].name;
    if (player.effectType === 'speedup') {
      ctx.fillStyle = '#00FF88';
      nameStr += ' ⚡' + Math.ceil(player.effectTimer) + 's';
    } else if (player.effectType === 'slowdown') {
      ctx.fillStyle = '#FF4444';
      nameStr += ' ❄' + Math.ceil(player.effectTimer) + 's';
    }
    ctx.fillText(nameStr, CANVAS_W - 10, 26);
  }
  
  // 底部: 存活AI蛇状态
  var xOff = 10;
  ctx.font = '12px Microsoft YaHei, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  for (var i = 0; i < snakes.length; i++) {
    if (i === playerIdx || !snakes[i].alive) continue;
    var s = snakes[i];
    var ch = CHARACTERS[s.charIdx];
    ctx.fillStyle = ch.color;
    var label = ch.name + '(' + s.body.length + ')';
    if (s.effectType === 'speedup') label += ' ⚡';
    else if (s.effectType === 'slowdown') label += ' ❄';
    ctx.fillText(label, xOff, CANVAS_H - 6);
    xOff += ctx.measureText(label).width + 15;
  }
  
  // 操作提示(前5秒)
  if (gameTime < 5) {
    ctx.font = '14px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, 1 - gameTime / 5) + ')';
    ctx.fillText(isMobile ? '滑动/D-pad移动 | ⚡加速 ❄减速 | 追吃AI蛇！' : '方向键/WASD移动 | ⚡加速果实 ❄减速果实 | 追吃AI蛇！', CANVAS_W / 2, CANVAS_H - 20);
  }
}
